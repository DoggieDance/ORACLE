name: Herald Feeds

# MANUAL-ONLY. Feeds are refreshed on the PC by tasks/publish-oracle.ps1 using
# Reddit RSS (anonymous, browser UA - works from a home IP). GitHub's datacenter
# IPs are 403'd by Reddit for BOTH JSON and RSS, so this Action can't refresh
# feeds from CI; it exists only as a manual hook / future OAuth path. It only
# ever writes feeds.json, never index.html, so it can't cause a build divergence.

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: herald-feeds
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh feeds.json
        run: node tasks/refresh-feeds.mjs feeds.json
      - name: Commit if changed
        run: |
          if git diff --quiet -- feeds.json; then echo "no feed changes"; exit 0; fi
          git config user.name "herald-bot"
          git config user.email "herald-bot@users.noreply.github.com"
          git add feeds.json
          git commit -m "Herald: feed refresh"
          git pull --rebase --autostash origin main
          git push
