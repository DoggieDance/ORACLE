name: Oracle Review

on:
  schedule:
    - cron: "0 11 * * *"   # daily, 11:00 UTC (~7am ET)
  push:
    paths: ["index.html"]
  workflow_dispatch: {}     # lets you run it manually from the Actions tab

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: File integrity
        run: |
          test -f index.html || { echo "::error::index.html missing from repo"; exit 1; }
          size=$(wc -c < index.html)
          echo "index.html: $size bytes"
          [ "$size" -gt 300000 ] || { echo "::error::index.html is suspiciously small ($size bytes) - truncated commit?"; exit 1; }
          tail -c 40 index.html | grep -q "</html>" || { echo "::error::index.html does not end with </html> - truncated."; exit 1; }

      - name: JavaScript syntax check
        run: |
          mkdir -p /tmp/blocks
          python3 - << 'EOF'
          import re
          html = open('index.html', encoding='utf-8').read()
          blocks = re.findall(r'<script>(.*?)</script>', html, re.S)
          assert blocks, 'no script blocks found'
          for i, b in enumerate(blocks):
              open('/tmp/blocks/b%d.js' % i, 'w', encoding='utf-8').write(b)
          print('%d script blocks extracted' % len(blocks))
          EOF
          for f in /tmp/blocks/*.js; do
            node --check "$f" || { echo "::error::$f fails to parse - the app will white-screen"; exit 1; }
          done
          echo "all script blocks parse cleanly"

      - name: Version consistency
        run: |
          meta=$(sed -n 's/.*name="oracle-build" content="\(v[0-9.]*\).*/\1/p' index.html | head -1)
          top=$(grep -m1 "build: 'v" index.html | sed "s/.*build: '\(v[0-9.]*\)'.*/\1/")
          echo "meta build: $meta / changelog top: $top"
          [ -n "$meta" ] || { echo "::error::oracle-build meta tag not found"; exit 1; }
          [ "$meta" = "$top" ] || { echo "::error::build badge mismatch: meta says $meta but CHANGELOG[0] says $top"; exit 1; }

      - name: Live site check
        run: |
          code=$(curl -s -o live.html -w "%{http_code}" https://doggiedance.github.io/ORACLE/)
          echo "HTTP $code"
          [ "$code" = "200" ] || { echo "::error::live site returned HTTP $code"; exit 1; }
          live=$(sed -n 's/.*name="oracle-build" content="\(v[0-9.]*\).*/\1/p' live.html | head -1)
          repo=$(sed -n 's/.*name="oracle-build" content="\(v[0-9.]*\).*/\1/p' index.html | head -1)
          echo "live: $live / repo: $repo"
          if [ "$live" = "$repo" ]; then
            echo "deploy matches repo"
          else
            echo "::warning::live site ($live) has not caught up to repo ($repo) - Pages may still be deploying"
          fi
