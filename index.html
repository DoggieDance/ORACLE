<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Oracle">
<meta name="theme-color" content="#0a0a0f">
<title>Oracle — Commander Deck Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js'"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js'"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js'"></script>
<style>
  :root {
    --bg: #0a0a0f; --bg2: #0d0d14; --surface: #14141d; --surface2: #1c1c28; --surface3: #25253480;
    --border: #2a2a3d; --border-light: #36364d;
    --gold: #c9a84c; --gold-bright: #e0c46a; --gold-dim: #8a6f2e; --gold-glow: rgba(201,168,76,0.16);
    --text: #e8e0cc; --muted: #82796a; --muted2: #5a5448; --white: #f5f0e8;
    --w: #f4e9c1; --u: #4b8fd6; --b: #9a7fb0; --r: #d8523f; --g: #4fa86e; --c: #b0a99a;
    --green-ok: #4fa86e; --red-bad: #d8523f;
    --radius: 16px; --radius-sm: 11px; --card-radius: 14px;
    --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; font-size: 16px; -webkit-font-smoothing: antialiased; }
  body { user-select: none; }
  #root { height: 100dvh; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 70% 35% at 50% -5%, rgba(201,168,76,0.08), transparent 65%), radial-gradient(ellipse 90% 50% at 15% 110%, rgba(75,143,214,0.05), transparent 55%), radial-gradient(ellipse 80% 50% at 90% 105%, rgba(216,82,63,0.04), transparent 55%); pointer-events: none; z-index: 0; }

  .app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; max-width: 540px; margin: 0 auto; width: 100%; }

  /* tabs */
  .topbar { padding: calc(var(--sat) + 10px) 16px 0; flex-shrink: 0; background: linear-gradient(to bottom, rgba(10,10,15,0.97), rgba(13,13,20,0.92)); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
  .brand { font-family: 'Cinzel'; font-size: 16px; font-weight: 700; letter-spacing: 0.2em; color: var(--gold); text-align: center; text-shadow: 0 0 22px rgba(201,168,76,0.35); margin-bottom: 8px; }
  .tabs { display: flex; gap: 4px; }
  .tab { flex: 1; text-align: center; padding: 11px 4px 12px; font-family: 'Cinzel'; font-size: 12.5px; letter-spacing: 0.06em; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: color .2s; position: relative; }
  .tab.active { color: var(--gold-bright); border-bottom-color: var(--gold); }
  .tab .badge { display: inline-block; min-width: 17px; height: 17px; line-height: 17px; padding: 0 4px; border-radius: 9px; background: var(--surface2); color: var(--muted); font-size: 10px; font-family: 'Crimson Pro'; margin-left: 4px; vertical-align: middle; }
  .tab.active .badge { background: var(--gold-glow); color: var(--gold-bright); }

  .screen { flex: 1; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
  .screen::-webkit-scrollbar { display: none; }

  /* search area */
  .search-area { padding: 12px 14px 8px; flex-shrink: 0; background: rgba(10,10,15,0.85); position: relative; }
  .search-row { display: flex; gap: 8px; align-items: center; }
  .search-wrap { position: relative; flex: 1; }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; color: var(--gold-dim); pointer-events: none; }
  .clear-icon { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  input.search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 36px 12px 38px; font-family: 'Crimson Pro'; font-size: 16px; color: var(--text); outline: none; transition: border-color .2s, box-shadow .2s; -webkit-appearance: none; }
  input.search-input:focus { border-color: var(--gold-dim); box-shadow: 0 0 0 3px var(--gold-glow); }
  input.search-input::placeholder { color: var(--muted2); }
  .icon-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--gold); border-radius: var(--radius); width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background .15s, transform .1s; -webkit-appearance: none; position: relative; }
  .icon-btn:active { transform: scale(.94); background: var(--border); }
  .icon-btn svg { width: 21px; height: 21px; }
  .icon-btn.active { background: var(--gold-glow); border-color: var(--gold-dim); color: var(--gold-bright); }
  .filter-badge { position: absolute; top: -5px; right: -5px; background: var(--gold); color: #1a1000; font-size: 10px; font-weight: 700; min-width: 17px; height: 17px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: 'Crimson Pro'; padding: 0 4px; }

  .autocomplete { position: absolute; left: 14px; right: 14px; top: calc(100% - 4px); background: var(--surface2); border: 1px solid var(--border-light); border-radius: var(--radius-sm); box-shadow: 0 12px 40px rgba(0,0,0,.6); z-index: 50; max-height: 260px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .ac-item { padding: 11px 16px; font-size: 15px; color: var(--text); cursor: pointer; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:active { background: var(--gold-glow); }
  .ac-item svg { width: 13px; height: 13px; color: var(--gold-dim); flex-shrink: 0; }

  .chip-row { display: flex; gap: 7px; overflow-x: auto; padding: 8px 0 3px; scrollbar-width: none; }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all .15s; -webkit-appearance: none; font-family: 'Crimson Pro'; }
  .chip.active { background: var(--gold-glow); border-color: var(--gold-dim); color: var(--gold-bright); }
  .chip:active { transform: scale(.95); }

  .results-pad { padding: 8px 12px calc(20px + var(--sab)); }
  .results-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 4px 12px; gap: 10px; }
  .results-meta { font-size: 13px; color: var(--muted); font-style: italic; flex: 1; }
  .sort-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 6px 11px; font-size: 12px; color: var(--gold); cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: 'Cinzel'; flex-shrink: 0; -webkit-appearance: none; }
  .sort-btn:active { background: var(--border); }
  .sort-btn svg { width: 13px; height: 13px; }

  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card-tile { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); overflow: hidden; position: relative; transition: transform .12s, box-shadow .15s; }
  .card-tile:active { transform: scale(.97); }
  .card-tile.in-deck { border-color: var(--gold-dim); box-shadow: 0 0 0 1px var(--gold-dim); }
  .card-img-wrap { width: 100%; aspect-ratio: 488/680; background: var(--surface2); overflow: hidden; position: relative; cursor: pointer; }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity .35s; }
  .card-img-wrap img.loaded { opacity: 1; }
  .img-skeleton { position: absolute; inset: 0; background: linear-gradient(100deg, var(--surface2) 30%, var(--surface3) 50%, var(--surface2) 70%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .card-img-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 14px; text-align: center; height: 100%; }
  .card-img-placeholder .pn { font-family: 'Cinzel'; font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .card-img-placeholder .pt { font-size: 11px; color: var(--muted); font-style: italic; }

  .card-footer { padding: 6px 8px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
  .card-name-small { font-family: 'Cinzel'; font-size: 10px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .add-btn { width: 28px; height: 28px; border-radius: 8px; background: var(--gold-glow); border: 1px solid var(--gold-dim); color: var(--gold-bright); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; cursor: pointer; flex-shrink: 0; -webkit-appearance: none; line-height: 1; padding-bottom: 2px; }
  .add-btn:active { transform: scale(.9); background: var(--gold); color: #1a1000; }
  .add-btn.added { background: var(--surface2); border-color: var(--border-light); color: var(--gold); }
  .qty-pill { position: absolute; top: 6px; right: 6px; background: rgba(10,10,15,.85); border: 1px solid var(--gold-dim); color: var(--gold-bright); font-family: 'Cinzel'; font-size: 12px; font-weight: 600; min-width: 24px; height: 24px; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 0 6px; backdrop-filter: blur(4px); }
  .cmdr-flag { position: absolute; top: 6px; left: 6px; background: rgba(201,168,76,.92); color: #1a1000; font-family: 'Cinzel'; font-size: 9px; font-weight: 700; letter-spacing: .05em; padding: 3px 7px; border-radius: 7px; }

  .pip { width: 15px; height: 15px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; font-family: 'Crimson Pro'; color: #1a1408; flex-shrink: 0; box-shadow: inset 0 -1px 2px rgba(0,0,0,.25); }
  .pip.W { background: var(--w); } .pip.U { background: var(--u); color:#fff; } .pip.B { background: var(--b); color:#fff; } .pip.R { background: var(--r); color:#fff; } .pip.G { background: var(--g); color:#fff; } .pip.C { background: var(--c); } .pip.generic { background: #5a5448; color: var(--text); } .pip.X { background: #5a5448; color: var(--text); } .pip.hybrid { background: linear-gradient(135deg,var(--gold) 50%,var(--u) 50%); }

  .state-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 30px; text-align: center; gap: 14px; color: var(--muted); font-style: italic; font-size: 15px; line-height: 1.5; }
  .state-msg .symbol { font-size: 40px; opacity: .35; }
  .state-msg em { color: var(--gold-dim); }
  .spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .load-more-btn { display: block; width: 100%; margin-top: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; color: var(--gold-dim); font-family: 'Cinzel'; font-size: 13px; letter-spacing: .06em; cursor: pointer; text-align: center; -webkit-appearance: none; }
  .load-more-btn:active { background: var(--border); color: var(--gold); }

  /* ===== DECK SCREEN ===== */
  .deck-screen { padding: 14px 14px calc(30px + var(--sab)); }
  .cmdr-banner { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; display: flex; gap: 13px; align-items: center; position: relative; overflow: hidden; }
  .cmdr-banner::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 50% 80% at 100% 50%, var(--gold-glow), transparent 70%); pointer-events: none; }
  .cmdr-art { width: 54px; height: 54px; border-radius: 11px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--gold-dim); box-shadow: 0 2px 10px rgba(0,0,0,.4); }
  .cmdr-art.empty { background: var(--surface3); display: flex; align-items: center; justify-content: center; color: var(--gold-dim); font-size: 22px; }
  .cmdr-info { flex: 1; min-width: 0; position: relative; }
  .cmdr-label { font-family: 'Cinzel'; font-size: 10px; letter-spacing: .12em; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 2px; }
  .cmdr-name { font-family: 'Cinzel'; font-size: 16px; font-weight: 600; color: var(--white); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cmdr-sub { font-size: 12px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ci-pips { display: inline-flex; gap: 2px; }

  .deck-count-hero { display: flex; align-items: baseline; justify-content: center; gap: 8px; margin: 6px 0 16px; }
  .deck-count-num { font-family: 'Cinzel'; font-size: 38px; font-weight: 700; color: var(--gold-bright); line-height: 1; text-shadow: 0 0 24px var(--gold-glow); }
  .deck-count-num.over { color: var(--red-bad); }
  .deck-count-target { font-family: 'Cinzel'; font-size: 17px; color: var(--muted); }
  .deck-count-label { font-size: 12px; color: var(--muted); font-style: italic; }

  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .stat-title { font-family: 'Cinzel'; font-size: 11px; letter-spacing: .09em; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .stat-title .stat-extra { color: var(--gold-dim); font-family: 'Crimson Pro'; text-transform: none; letter-spacing: 0; font-size: 12px; }

  /* curve chart */
  .curve { display: flex; align-items: flex-end; gap: 6px; height: 96px; }
  .curve-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; height: 100%; justify-content: flex-end; }
  .curve-bar-wrap { width: 100%; flex: 1; display: flex; align-items: flex-end; }
  .curve-bar { width: 100%; background: linear-gradient(to top, var(--gold-dim), var(--gold)); border-radius: 4px 4px 0 0; min-height: 2px; transition: height .4s cubic-bezier(.32,.72,0,1); position: relative; }
  .curve-bar .cb-count { position: absolute; top: -16px; left: 0; right: 0; text-align: center; font-size: 10px; color: var(--gold-bright); font-family: 'Cinzel'; }
  .curve-x { font-size: 11px; color: var(--muted); font-family: 'Cinzel'; }

  /* color bar */
  .colorbar { display: flex; height: 14px; border-radius: 7px; overflow: hidden; margin-bottom: 10px; background: var(--surface2); }
  .colorbar-seg { height: 100%; transition: width .4s; }
  .color-legend { display: flex; flex-wrap: wrap; gap: 10px 14px; }
  .color-legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text); }

  /* type grid */
  .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 11px; background: var(--surface2); border-radius: 9px; font-size: 14px; }
  .type-row .tr-label { color: var(--muted); }
  .type-row .tr-count { font-family: 'Cinzel'; color: var(--gold-bright); font-weight: 600; }

  .deck-actions { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .deck-action { flex: 1; min-width: calc(50% - 4px); text-align: center; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--gold); font-family: 'Cinzel'; font-size: 12px; letter-spacing: .03em; cursor: pointer; -webkit-appearance: none; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .deck-action:active { background: var(--border); }
  .deck-action svg { width: 14px; height: 14px; }
  .deck-action.danger { color: var(--red-bad); }

  /* deck card list */
  .deck-section-head { font-family: 'Cinzel'; font-size: 12px; letter-spacing: .08em; color: var(--gold-dim); text-transform: uppercase; margin: 16px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .deck-line { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 1px solid var(--border); }
  .deck-line:active { background: var(--surface); }
  .dl-qty { font-family: 'Cinzel'; font-size: 14px; color: var(--gold-bright); min-width: 26px; text-align: center; font-weight: 600; }
  .dl-name { flex: 1; font-size: 15px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .dl-mana { display: flex; gap: 2px; flex-shrink: 0; }
  .dl-controls { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .dl-btn { width: 26px; height: 26px; border-radius: 7px; background: var(--surface2); border: 1px solid var(--border); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; -webkit-appearance: none; line-height: 1; }
  .dl-btn:active { background: var(--border); transform: scale(.9); }
  .dl-warn { color: var(--red-bad); font-size: 11px; margin-left: 4px; }

  /* ===== DECKS LIST SCREEN ===== */
  .decks-screen { padding: 16px 14px calc(30px + var(--sab)); }
  .deck-card-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 11px; cursor: pointer; display: flex; gap: 13px; align-items: center; transition: border-color .15s; }
  .deck-card-item:active { border-color: var(--gold-dim); }
  .deck-card-item.active-deck { border-color: var(--gold-dim); box-shadow: 0 0 0 1px var(--gold-dim); }
  .dci-art { width: 46px; height: 46px; border-radius: 10px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border-light); }
  .dci-art.empty { background: var(--surface3); display: flex; align-items: center; justify-content: center; color: var(--gold-dim); font-size: 18px; }
  .dci-info { flex: 1; min-width: 0; }
  .dci-name { font-family: 'Cinzel'; font-size: 15px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dci-meta { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 8px; }
  .new-deck-btn { width: 100%; background: var(--gold-glow); border: 1px dashed var(--gold-dim); border-radius: var(--radius); padding: 15px; color: var(--gold-bright); font-family: 'Cinzel'; font-size: 13px; letter-spacing: .05em; cursor: pointer; -webkit-appearance: none; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .new-deck-btn:active { background: var(--gold-dim); color: #1a1000; }

  /* ===== SHEETS ===== */
  .sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); z-index: 90; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 95; background: var(--bg2); border-top-left-radius: 24px; border-top-right-radius: 24px; border-top: 1px solid var(--border-light); box-shadow: 0 -8px 40px rgba(0,0,0,.5); max-height: 88dvh; display: flex; flex-direction: column; max-width: 540px; margin: 0 auto; animation: sheetUp .32s cubic-bezier(.32,.72,0,1); }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle { width: 38px; height: 5px; background: var(--border-light); border-radius: 3px; margin: 10px auto 4px; flex-shrink: 0; }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sheet-title { font-family: 'Cinzel'; font-size: 16px; font-weight: 600; color: var(--gold); letter-spacing: .05em; }
  .sheet-action { font-size: 14px; color: var(--gold); cursor: pointer; font-family: 'Crimson Pro'; padding: 4px 6px; }
  .sheet-action.reset { color: var(--muted); }
  .sheet-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 18px calc(20px + var(--sab)); }
  .sheet-body::-webkit-scrollbar { display: none; }

  .fgroup { margin-bottom: 22px; }
  .fgroup-label { font-family: 'Cinzel'; font-size: 12px; letter-spacing: .09em; color: var(--muted); text-transform: uppercase; margin-bottom: 11px; display: flex; align-items: center; gap: 7px; }
  .fgroup-label .hint { font-family: 'Crimson Pro'; font-size: 11px; color: var(--muted2); text-transform: none; letter-spacing: 0; font-style: italic; }

  .color-grid { display: flex; gap: 9px; }
  .color-btn { flex: 1; aspect-ratio: 1; border-radius: 13px; border: 2px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; position: relative; }
  .color-btn:active { transform: scale(.92); }
  .color-btn .cpip { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; box-shadow: inset 0 -2px 3px rgba(0,0,0,.2); }

    }

    window.addEventListener('error', function (event) {
      if (!window.__oracleMounted && event && event.message) showBootFailure('A startup error occurred.');
    });
    window.setTimeout(function () {
      if (!window.__oracleMounted) showBootFailure('Oracle is taking longer than expected to load.');
    }, 8000);
  }());
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const API = 'https://api.scryfall.com';
const HEADERS = { 'Accept': 'application/json' };
const haptic = () => { if (navigator.vibrate) navigator.vibrate(8); };
const esc = s => (s==null?'':String(s));

// ---- storage helpers (safe; webview storage can be unreliable) ----
const STORE_KEY = 'oracle_decks_v1';
function cardKey(card) {
  if (!card) return '';
  return card.oracle_id || (card.name || '').toLocaleLowerCase() || card.id;
}
function normalizeDecks(raw) {
  if (!Array.isArray(raw)) return null;
  return raw.map(deck => {
    const cards = {};
    Object.values((deck && deck.cards) || {}).forEach(entry => {
      if (!entry || !entry.card) return;
      const key = cardKey(entry.card);
      const qty = Math.max(1, Number(entry.qty) || 1);
      cards[key] = cards[key] ? { ...cards[key], qty: cards[key].qty + qty } : { ...entry, qty };
    });
    return { ...deck, cards };
  });
}
function loadDecks() {
  try { const r = localStorage.getItem(STORE_KEY); return r ? normalizeDecks(JSON.parse(r)) : null; } catch(e) { return null; }
}
function saveDecks(decks) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(decks)); return true; } catch(e) { return false; }
}

const COLORS = [
  { c:'W', sym:'\u2600' }, { c:'U', sym:'\u{1F4A7}' }, { c:'B', sym:'\u2620' },
  { c:'R', sym:'\u{1F525}' }, { c:'G', sym:'\u{1F333}' }, { c:'C', sym:'\u25C7' }
];
const COLOR_VAR = { W:'var(--w)', U:'var(--u)', B:'var(--b)', R:'var(--r)', G:'var(--g)', C:'var(--c)' };
const COLOR_NAME = { W:'White', U:'Blue', B:'Black', R:'Red', G:'Green', C:'Colorless' };
const SORTS = [['name','Name'],['cmc','Mana Value'],['power','Power'],['toughness','Toughness'],['rarity','Rarity'],['usd','Price (USD)'],['edhrec','EDHREC Rank'],['released','Release Date']];
const BASICS = ['Plains','Island','Swamp','Mountain','Forest','Wastes'];

function cardImage(card, size) {
  size = size || 'normal';
  if (!card) return null;
  if (card.image_uris) return card.image_uris[size];
  if (card.card_faces && card.card_faces[0] && card.card_faces[0].image_uris) return card.card_faces[0].image_uris[size];
  return null;
}
function cardMana(card) {
  if (!card) return '';
  return card.mana_cost || (card.card_faces && card.card_faces[0] && card.card_faces[0].mana_cost) || '';
}
function isBasicLand(card) { return card && card.type_line && card.type_line.includes('Basic') && card.type_line.includes('Land'); }
function copyLimit(card) {
  if (isBasicLand(card)) return Infinity;
  const ot = (card && card.oracle_text) || (card && card.card_faces && card.card_faces[0] && card.card_faces[0].oracle_text) || '';
  if (/any number of cards named/i.test(ot)) return Infinity;
  const words = { one:1, two:2, three:3, four:4, five:5, six:6, seven:7, eight:8, nine:9, ten:10 };
  const match = ot.match(/a deck can have up to (\d+|one|two|three|four|five|six|seven|eight|nine|ten) cards? named/i);
  if (match) return Number(match[1]) || words[match[1].toLowerCase()] || 1;
  return 1;
}
function allowsMultiples(card) { return copyLimit(card) > 1; }

function ManaPips({ cost }) {
  if (!cost) return null;
  const syms = cost.match(/\{([^}]+)\}/g) || [];
  return syms.map((s, i) => {
    const v = s.slice(1,-1);
    let cls = 'generic', txt = v;
    if (/^[WUBRG]$/.test(v)) { cls = v; txt = v; }
    else if (v === 'C') { cls = 'C'; txt = '\u25C7'; }
    else if (v === 'X') { cls = 'X'; txt = 'X'; }
    else if (/^\d+$/.test(v)) { cls = 'generic'; txt = v; }
    else if (v.includes('/')) { cls = 'hybrid'; txt = v[0]; }
    return <span key={i} className={'pip ' + cls}>{txt}</span>;
  });
}

// ============ MAIN APP ============
function App() {
  const [tab, setTab] = useState('search'); // search | deck | decks
  const [decks, setDecks] = useState(() => loadDecks() || []);
  const [activeDeckId, setActiveDeckId] = useState(() => { const d = loadDecks(); return d && d.length ? d[0].id : null; });
  const [toast, setToast] = useState('');
  const [detailCard, setDetailCard] = useState(null);
  const [playtesting, setPlaytesting] = useState(false);
  const [storageWarned, setStorageWarned] = useState(false);
  const toastTimer = useRef(null);

  const showToast = useCallback((msg) => {
    clearTimeout(toastTimer.current);
    setToast(msg);
    toastTimer.current = setTimeout(() => setToast(''), 2400);
  }, []);

  useEffect(() => () => clearTimeout(toastTimer.current), []);

  // persist decks
  useEffect(() => {
    const ok = saveDecks(decks);
    if (!ok && !storageWarned && decks.length) {
      setStorageWarned(true);
      showToast('Heads up: on-device saving may not persist. Use Export to back up.');
    }
  }, [decks, storageWarned, showToast]);

  const activeDeck = decks.find(d => d.id === activeDeckId) || null;

  function createDeck(name) {
    const id = 'd' + Date.now();
    const nd = { id, name: name || 'Untitled Deck', commander: null, cards: {}, created: Date.now() };
    setDecks(p => [nd, ...p]); setActiveDeckId(id); setTab('deck');
    showToast('Deck created');
  }
  function deleteDeck(id) {
    setDecks(p => p.filter(d => d.id !== id));
    if (activeDeckId === id) { const rest = decks.filter(d => d.id !== id); setActiveDeckId(rest.length ? rest[0].id : null); }
    showToast('Deck deleted');
  }
  function updateActiveDeck(updater) {
    setDecks(p => p.map(d => d.id === activeDeckId ? updater(d) : d));
  }
  function ensureDeck(cb) {
    if (activeDeck) { cb(activeDeck); return; }
    const id = 'd' + Date.now();
    const nd = { id, name: 'Untitled Deck', commander: null, cards: {}, created: Date.now() };
    setDecks(p => [nd, ...p]); setActiveDeckId(id);
    setTimeout(() => cb(nd), 0);
  }

  // ---- color identity of active commander ----
  const commanderCI = activeDeck && activeDeck.commander ? (activeDeck.commander.color_identity || []) : null;

  function ciViolation(card) {
    if (!commanderCI) return false;
    const ci = card.color_identity || [];
    return ci.some(c => !commanderCI.includes(c));
  }

  function addCard(card, asCommander) {
    ensureDeck((deck) => {
      updateActiveDeckById(deck.id, d => {
        if (asCommander) {
          return { ...d, commander: card, name: d.name === 'Untitled Deck' ? card.name : d.name };
        }
        const cards = { ...d.cards };
        const key = cardKey(card);
        const existing = cards[key];
        const limit = copyLimit(card);
        if (existing) {
          if (existing.qty < limit) cards[key] = { ...existing, qty: existing.qty + 1 };
          else { showToast(limit === 1 ? 'Singleton: only 1 copy allowed' : 'Copy limit reached'); return d; }
        } else {
          cards[key] = { card, qty: 1 };
        }
        return { ...d, cards };
      });
    });
    haptic();
    if (asCommander) showToast('Set as commander');
    else showToast('Added to deck');
  }

  function updateActiveDeckById(id, updater) { setDecks(p => p.map(d => d.id === id ? updater(d) : d)); }

  function changeQty(cardId, delta) {
    updateActiveDeck(d => {
      const cards = { ...d.cards };
      const e = cards[cardId];
      if (!e) return d;
      const nq = e.qty + delta;
      if (nq <= 0) { delete cards[cardId]; }
      else {
        const limit = copyLimit(e.card);
        if (nq > limit) { showToast(limit === 1 ? 'Singleton: only 1 copy allowed' : 'Copy limit reached'); return d; }
        cards[cardId] = { ...e, qty: nq };
      }
      return { ...d, cards };
    });
    haptic();
  }
  function removeCard(cardId) { updateActiveDeck(d => { const cards = { ...d.cards }; delete cards[cardId]; return { ...d, cards }; }); haptic(); }
  function setCommander(card) {
    ensureDeck(deck => updateActiveDeckById(deck.id, d => {
      const cards = { ...d.cards };
      delete cards[cardKey(card)];
      return { ...d, commander: card, cards, name: d.name === 'Untitled Deck' ? card.name : d.name };
    }));
    showToast('Commander set');
    haptic();
  }
  function clearCommander() { updateActiveDeck(d => ({ ...d, commander: null })); }

  // deck stats
  const deckList = activeDeck ? Object.values(activeDeck.cards) : [];
  const deckTotal = deckList.reduce((s, e) => s + e.qty, 0) + (activeDeck && activeDeck.commander ? 1 : 0);

  function startPlaytest() {
    const total = deckList.reduce((s,e)=>s+e.qty,0);
    if (total < 1) { showToast('Add cards first'); return; }
    setPlaytesting(true); haptic();
  }

  // Import a decklist: lines like "30 Forest", "1 Sol Ring", "Relentless Rats x4", "// comment".
  // Honors multiples (basics, Relentless Rats, etc.). Resolves names via Scryfall collection endpoint.
  async function importDeckList(text, onProgress, onDone) {
    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l && !l.startsWith('//') && !l.startsWith('#'));
    const parsed = [];
    let commanderName = null;
    for (let line of lines) {
      // strip set/collector annotations like (MH3) 123 and trailing *F* etc.
      let isCmdr = /\*cmdr\*|\*commander\*/i.test(line);
      line = line.replace(/\*[^*]*\*/g, '').trim();
      line = line.replace(/\((?:[A-Za-z0-9]{2,5})\)\s*[\dA-Za-z\-]*$/,'').trim();
      // formats: "3 Name", "3x Name", "Name x3", "Name"
      let qty = 1, name = line;
      let m = line.match(/^(\d+)\s*[xX]?\s+(.+)$/);
      if (m) { qty = parseInt(m[1]); name = m[2]; }
      else { let m2 = line.match(/^(.+?)\s+[xX](\d+)$/); if (m2) { name = m2[1]; qty = parseInt(m2[2]); } }
      name = name.trim();
      if (!name) continue;
      if (isCmdr) commanderName = name;
      parsed.push({ qty, name, isCmdr });
    }
    if (!parsed.length) { onDone({ ok:false, msg:'No cards found in that list.' }); return; }

    // resolve unique names via Scryfall collection (batch of 75)
    const uniqueNames = [...new Set(parsed.map(p => p.name.toLowerCase()))];
    const nameToCard = {};
    const notFound = [];
    onProgress('Looking up ' + uniqueNames.length + ' cards...');
    const idsByLower = {};
    parsed.forEach(p => { idsByLower[p.name.toLowerCase()] = p.name; });
    const batches = [];
    const namesArr = Object.values(idsByLower);
    for (let i=0;i<namesArr.length;i+=75) batches.push(namesArr.slice(i,i+75));
    try {
      for (let bi=0; bi<batches.length; bi++) {
        onProgress('Looking up cards... (' + (bi+1) + '/' + batches.length + ')');
        const body = { identifiers: batches[bi].map(n => ({ name: n })) };
        const res = await fetch(API + '/cards/collection', { method:'POST', headers: { ...HEADERS, 'Content-Type':'application/json' }, body: JSON.stringify(body) });
        const data = await res.json();
        if (!res.ok || data.object === 'error') throw new Error(data.details || 'Scryfall could not resolve that list.');
        (data.data || []).forEach(card => { nameToCard[card.name.toLowerCase()] = card; });
        (data.not_found || []).forEach(nf => { if (nf.name) notFound.push(nf.name); });
        if (bi < batches.length-1) await new Promise(r => setTimeout(r, 120));
      }
    } catch(e) { onDone({ ok:false, msg:e.message || 'Network error during import.' }); return; }

    // build deck
    const id = 'd' + Date.now();
    const cards = {};
    let cmdr = null;
    let added = 0;
    parsed.forEach(p => {
      const card = nameToCard[p.name.toLowerCase()];
      if (!card) return;
      if (p.isCmdr && !cmdr) { cmdr = card; return; }
      const key = cardKey(card);
      if (cards[key]) cards[key] = { ...cards[key], qty: cards[key].qty + p.qty };
      else cards[key] = { card, qty: p.qty };
      added += p.qty;
    });
    if (cmdr) delete cards[cardKey(cmdr)];
    // if no explicit commander but a single legendary creature at qty1 and 100 total, leave as-is (user can set)
    const deckName = commanderName || 'Imported Deck';
    const nd = { id, name: deckName, commander: cmdr, cards, created: Date.now() };
    setDecks(p => [nd, ...p]); setActiveDeckId(id);
    const msg = 'Imported ' + (added + (cmdr?1:0)) + ' cards' + (notFound.length ? ' \u00b7 ' + notFound.length + ' not found' : '');
    onDone({ ok:true, msg, notFound });
  }

  return (
    <div className="app">
      <div className="topbar">
        <div className="brand">&#10022; ORACLE &#10022;</div>
        <div className="tabs">
          <div className={'tab ' + (tab==='search'?'active':'')} onClick={() => { setTab('search'); haptic(); }}>Search</div>
          <div className={'tab ' + (tab==='deck'?'active':'')} onClick={() => { setTab('deck'); haptic(); }}>
            Deck{deckTotal>0 && <span className="badge">{deckTotal}</span>}
          </div>
          <div className={'tab ' + (tab==='decks'?'active':'')} onClick={() => { setTab('decks'); haptic(); }}>
            My Decks{decks.length>0 && <span className="badge">{decks.length}</span>}
          </div>
        </div>
      </div>

      {tab === 'search' && (
        <SearchScreen
          activeDeck={activeDeck}
          onOpenDetail={setDetailCard}
          onAdd={addCard}
          ciViolation={ciViolation}
          commanderCI={commanderCI}
        />
      )}
      {tab === 'deck' && (
        <DeckScreen
          deck={activeDeck}
          deckList={deckList}
          deckTotal={deckTotal}
          onChangeQty={changeQty}
          onRemove={removeCard}
          onOpenDetail={setDetailCard}
          onClearCommander={clearCommander}
          onDrawHand={startPlaytest}
          onGoSearch={() => setTab('search')}
          ciViolation={ciViolation}
          showToast={showToast}
        />
      )}
      {tab === 'decks' && (
        <DecksScreen
          decks={decks}
          activeDeckId={activeDeckId}
          onSelect={(id) => { setActiveDeckId(id); setTab('deck'); haptic(); }}
          onCreate={createDeck}
          onDelete={deleteDeck}
          onImport={importDeckList}
        />
      )}

      {detailCard && (
        <DetailOverlay
          card={detailCard}
          onClose={() => setDetailCard(null)}
          onAdd={(c) => addCard(c, false)}
          onSetCommander={(c) => { setCommander(c); }}
          inDeck={activeDeck && activeDeck.cards[cardKey(detailCard)]}
          isCommander={activeDeck && activeDeck.commander && cardKey(activeDeck.commander) === cardKey(detailCard)}
          ciViolation={ciViolation}
        />
      )}

      {playtesting && <PlaytestBoard deck={activeDeck} deckList={deckList} onClose={() => setPlaytesting(false)} />}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// ============ SEARCH SCREEN ============
function SearchScreen({ activeDeck, onOpenDetail, onAdd, ciViolation, commanderCI }) {
  const [query, setQuery] = useState('');
  const [activeChip, setActiveChip] = useState('');
  const [cards, setCards] = useState([]);
  const [status, setStatus] = useState('empty'); // empty | loading | error | results
  const [errMsg, setErrMsg] = useState('');
  const [meta, setMeta] = useState('');
  const [nextPage, setNextPage] = useState(null);
  const [sortOrder, setSortOrder] = useState('name');
  const [showSort, setShowSort] = useState(false);
  const [showFilter, setShowFilter] = useState(false);
  const [ac, setAc] = useState([]);
  const [filters, setFilters] = useState({ colors:new Set(), colorMode:'exact', types:new Set(), subtype:'', oracle:'', cmc:[0,16], pow:[0,16], tou:[0,16], rarities:new Set() });
  const lastQ = useRef('');
  const acTimer = useRef(null);
  const acCtrl = useRef(null);
  const searchCtrl = useRef(null);
  const requestNo = useRef(0);
  const [loadingMore, setLoadingMore] = useState(false);

  const CHIPS = [['','All'],['t:legendary t:creature','Legendaries'],['t:creature','Creatures'],['t:instant','Instants'],['t:sorcery','Sorceries'],['t:enchantment','Enchant.'],['t:artifact','Artifacts'],['t:planeswalker','Walkers'],['t:land','Lands']];

  function filterCount() {
    let n = 0; const f = filters;
    if (f.colors.size) n++; if (f.types.size) n++; if (f.subtype.trim()) n++; if (f.oracle.trim()) n++;
    if (f.cmc[0]>0||f.cmc[1]<16) n++; if (f.pow[0]>0||f.pow[1]<16) n++; if (f.tou[0]>0||f.tou[1]<16) n++; if (f.rarities.size) n++;
    return n;
  }
  function buildFilterQ(sourceFilters) {
    const f = sourceFilters || filters; const parts = [];
    if (f.colors.size) {
      if (f.colors.has('C') && f.colors.size===1) parts.push('c:c');
      else { const c=[...f.colors].filter(x=>x!=='C').join(''); if (c){ const op=f.colorMode==='exact'?'=':f.colorMode==='atmost'?'<=':'>='; parts.push('c'+op+c);} }
    }
    f.types.forEach(t=>parts.push('t:'+t));
    if (f.subtype.trim()) f.subtype.trim().split(/\s+/).forEach(s=>parts.push('t:'+s));
    if (f.oracle.trim()) { const o=f.oracle.trim(); parts.push(o.includes(' ')?'o:"'+o+'"':'o:'+o); }
    const rng=(a,fl)=>{ if(a[0]>0)parts.push(fl+'>='+a[0]); if(a[1]<16)parts.push(fl+'<='+a[1]); };
    rng(f.cmc,'mv'); rng(f.pow,'pow'); rng(f.tou,'tou');
    if (f.rarities.size) parts.push('('+[...f.rarities].map(r=>'r:'+r).join(' OR ')+')');
    return parts.join(' ');
  }

  const doSearch = useCallback(async (options = {}) => {
    const { chipOverride, queryOverride, filtersOverride, sortOverride } = options;
    const chip = chipOverride !== undefined ? chipOverride : activeChip;
    const raw = (queryOverride !== undefined ? queryOverride : query).trim();
    const fq = buildFilterQ(filtersOverride || filters);
    const parts = [];
    if (raw) parts.push(raw);
    if (chip && !fq.includes('t:') && !raw.includes('t:')) parts.push(chip);
    if (fq) parts.push(fq);
    const q = parts.join(' ').trim() || 'game:paper';
    const requestId = ++requestNo.current;

    if (searchCtrl.current) searchCtrl.current.abort();
    searchCtrl.current = new AbortController();

    setAc([]);
    lastQ.current = q;
    setStatus('loading');
    setCards([]);
    setNextPage(null);
    try {
      const url = API + '/cards/search?q=' + encodeURIComponent(q) + '&order=' + (sortOverride || sortOrder) + '&unique=cards';
      const res = await fetch(url, { headers: HEADERS, signal: searchCtrl.current.signal });
      const data = await res.json();
      if (requestId !== requestNo.current) return;
      if (!res.ok || data.object === 'error') {
        setErrMsg(data.details || 'No cards match.');
        setStatus('error');
        return;
      }
      const resultCards = data.data || [];
      setCards(resultCards);
      setNextPage(data.has_more ? data.next_page : null);
      const total = data.total_cards || 0;
      setMeta(total.toLocaleString() + ' card' + (total !== 1 ? 's' : '') + ' · showing ' + resultCards.length);
      setStatus('results');
    } catch(e) {
      if (e.name === 'AbortError') return;
      if (requestId !== requestNo.current) return;
      setErrMsg('Network error — check your connection and try again.');
      setStatus('error');
    }
  }, [query, activeChip, sortOrder, filters]);

  async function loadMore() {
    if (!nextPage || loadingMore) return;
    setLoadingMore(true);
    try {
      const res = await fetch(nextPage, { headers: HEADERS });
      const data = await res.json();
      if (!res.ok || data.object === 'error') throw new Error(data.details || 'Could not load more cards.');
      setCards(previous => {
        const merged = previous.concat(data.data || []);
        setMeta('Showing ' + merged.length + ' cards');
        return merged;
      });
      setNextPage(data.has_more ? data.next_page : null);
    } catch(e) {
      setMeta('Could not load more cards. Tap Load More to retry.');
    } finally {
      setLoadingMore(false);
    }
  }

  // autocomplete
  function onInput(v) {
    setQuery(v);
    clearTimeout(acTimer.current);
    if (acCtrl.current) acCtrl.current.abort();
    if (v.trim().length < 2 || /[:<>=]/.test(v)) { setAc([]); return; }
    const requested = v.trim();
    acTimer.current = setTimeout(async () => {
      try {
        acCtrl.current = new AbortController();
        const res = await fetch(API + '/cards/autocomplete?q=' + encodeURIComponent(requested), { headers: HEADERS, signal: acCtrl.current.signal });
        const data = await res.json();
        if (res.ok) setAc(data.data ? data.data.slice(0,8) : []);
      } catch(e) {
        if (e.name !== 'AbortError') setAc([]);
      }
    }, 220);
  }

  useEffect(() => () => {
    clearTimeout(acTimer.current);
    if (acCtrl.current) acCtrl.current.abort();
    if (searchCtrl.current) searchCtrl.current.abort();
  }, []);

  function reSearch() { if (lastQ.current) doSearch(); }
  useEffect(() => { if (lastQ.current) doSearch(); }, [sortOrder]);

  return (
    <div className="screen">
      <div className="search-area">
        <div className="search-row">
          <div className="search-wrap">
            <svg className="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input className="search-input" type="text" value={query} placeholder="Card name or syntax..."
              autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
              onChange={e => onInput(e.target.value)}
              onKeyDown={e => { if (e.key==='Enter'){ e.target.blur(); setAc([]); doSearch(); } }} />
            {query && <div className="clear-icon" onClick={() => { setQuery(''); setAc([]); }}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>
            </div>}
          </div>
          <button className={'icon-btn ' + (filterCount()>0?'active':'')} onClick={() => { setShowFilter(true); haptic(); }}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
            {filterCount()>0 && <span className="filter-badge">{filterCount()}</span>}
          </button>
        </div>
        {ac.length > 0 && (
          <div className="autocomplete">
            {ac.map((name,i) => (
              <div key={i} className="ac-item" onClick={() => { setQuery(name); setAc([]); doSearch({ queryOverride:name }); }}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>{name}
              </div>
            ))}
          </div>
        )}
        <div className="chip-row">
          {CHIPS.map(([f,l]) => (
            <button key={l} className={'chip ' + (activeChip===f?'active':'')} onClick={() => { setActiveChip(f); haptic(); doSearch({ chipOverride:f }); }}>{l}</button>
          ))}
        </div>
      </div>

      <div className="results-pad">
        {status === 'empty' && (
          <div className="state-msg"><div className="symbol">&#10022;</div>
            <div>Search any card, then tap <em>+</em> to add it to your deck. Use the <em>filter</em> for colors, types, mana value & more.</div>
          </div>
        )}
        {status === 'loading' && <div className="state-msg"><div className="spinner"></div><div>Consulting the oracle...</div></div>}
        {status === 'error' && <div className="state-msg"><div className="symbol">&#9888;</div><div>{errMsg}</div></div>}
        {status === 'results' && (
          <>
            <div className="results-bar">
              <div className="results-meta">{meta}</div>
              <button className="sort-btn" onClick={() => { setShowSort(true); haptic(); }}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M6 12h12M9 18h6"/></svg>
                {SORTS.find(s=>s[0]===sortOrder)[1]}
              </button>
            </div>
            <div className="card-grid">
              {cards.map(card => {
                const inDeck = activeDeck && activeDeck.cards[cardKey(card)];
                const isCmdr = activeDeck && activeDeck.commander && cardKey(activeDeck.commander) === cardKey(card);
                const img = cardImage(card, 'normal');
                const violation = ciViolation(card);
                return (
                  <div key={card.id} className={'card-tile ' + (inDeck||isCmdr?'in-deck':'')}>
                    <div className="card-img-wrap" onClick={() => onOpenDetail(card)}>
                      {img ? <CardImg src={img} alt={card.name} /> :
                        <div className="card-img-placeholder"><div className="pn">{card.name}</div><div className="pt">{card.type_line}</div></div>}
                      {isCmdr && <div className="cmdr-flag">CMDR</div>}
                      {inDeck && <div className="qty-pill">{inDeck.qty}×</div>}
                    </div>
                    <div className="card-footer">
                      <div className="card-name-small" style={violation?{color:'var(--red-bad)'}:{}}>{violation?'⚠ ':''}{card.name}</div>
                      <button className={'add-btn ' + (inDeck?'added':'')} onClick={(e) => { e.stopPropagation(); onAdd(card, false); }}>+</button>
                    </div>
                  </div>
                );
              })}
            </div>
            {nextPage && <button className="load-more-btn" onClick={loadMore} disabled={loadingMore}>{loadingMore ? 'Loading…' : 'Load More Cards'}</button>}
          </>
        )}
      </div>

      {showSort && <SortSheet current={sortOrder} onPick={(s) => { setSortOrder(s); setShowSort(false); }} onClose={() => setShowSort(false)} />}
      {showFilter && <FilterSheet filters={filters} setFilters={setFilters} onApply={(nextFilters) => { setShowFilter(false); doSearch({ filtersOverride:nextFilters }); }} onClose={() => setShowFilter(false)} />}
    </div>
  );
}

function CardImg({ src, alt }) {
  const [loaded, setLoaded] = useState(false);
  const [failed, setFailed] = useState(false);
  useEffect(() => { setLoaded(false); setFailed(false); }, [src]);
  if (failed) {
    return <div className="card-img-placeholder"><div className="pn">{alt}</div><div className="pt">Artwork unavailable</div></div>;
  }
  return (
    <>
      {!loaded && <div className="img-skeleton"></div>}
      <img src={src} alt={alt} loading="lazy" className={loaded?'loaded':''}
        onLoad={() => setLoaded(true)}
        onError={() => { setFailed(true); setLoaded(true); }} />
    </>
  );
}

// ============ DECK SCREEN ============
function DeckScreen(props) {
  if (!props.deck) {
    return (
      <div className="screen"><div className="empty-deck-cta">
        <div className="state-msg"><div className="symbol">&#9876;</div>
          <div>No deck selected yet.<br/>Go to <em>Search</em> to add cards, or create one in <em>My Decks</em>.</div>
        </div>
        <button className="apply-btn" style={{maxWidth:'260px',margin:'0 auto'}} onClick={props.onGoSearch}>Find Cards</button>
      </div></div>
    );
  }
  return <DeckScreenContent {...props} />;
}

function DeckScreenContent({ deck, deckList, deckTotal, onChangeQty, onRemove, onOpenDetail, onClearCommander, onDrawHand, onGoSearch, ciViolation, showToast }) {
  const [showExport, setShowExport] = useState(false);

  // stats
  const stats = useMemo(() => {
    const buckets = [0,0,0,0,0,0,0,0]; // 0..6, 7+
    const colorCount = { W:0,U:0,B:0,R:0,G:0,C:0 };
    const types = { Creature:0, Instant:0, Sorcery:0, Enchantment:0, Artifact:0, Planeswalker:0, Land:0, Battle:0 };
    let price = 0, nonLandCount = 0, mvSum = 0;
    const all = [...deckList];
    if (deck.commander) all.push({ card: deck.commander, qty: 1 });
    all.forEach(({card, qty}) => {
      const tl = card.type_line || '';
      const isLand = tl.includes('Land');
      const mv = card.cmc != null ? card.cmc : 0;
      if (!isLand) {
        const idx = Math.min(7, Math.floor(mv));
        buckets[idx] += qty; nonLandCount += qty; mvSum += mv * qty;
      }
      const ci = card.color_identity || [];
      if (ci.length === 0) colorCount.C += qty;
      else ci.forEach(c => { colorCount[c] += qty; });
      Object.keys(types).forEach(t => { if (tl.includes(t)) types[t] += qty; });
      const p = card.prices && card.prices.usd ? parseFloat(card.prices.usd) : 0;
      price += p * qty;
    });
    const maxBucket = Math.max(1, ...buckets);
    const totalColorPips = Object.values(colorCount).reduce((a,b)=>a+b,0) || 1;
    const avgMv = nonLandCount ? (mvSum / nonLandCount) : 0;
    return { buckets, maxBucket, colorCount, totalColorPips, types, price, avgMv };
  }, [deckList, deck.commander]);

  // group deck list by type for display
  const groups = useMemo(() => {
    const order = ['Commander','Creature','Planeswalker','Instant','Sorcery','Enchantment','Artifact','Battle','Land','Other'];
    const g = {}; order.forEach(o => g[o] = []);
    deckList.forEach(e => {
      const tl = e.card.type_line || '';
      let cat = 'Other';
      if (tl.includes('Creature')) cat='Creature';
      else if (tl.includes('Planeswalker')) cat='Planeswalker';
      else if (tl.includes('Instant')) cat='Instant';
      else if (tl.includes('Sorcery')) cat='Sorcery';
      else if (tl.includes('Enchantment')) cat='Enchantment';
      else if (tl.includes('Artifact')) cat='Artifact';
      else if (tl.includes('Battle')) cat='Battle';
      else if (tl.includes('Land')) cat='Land';
      g[cat].push(e);
    });
    Object.values(g).forEach(arr => arr.sort((a,b) => (a.card.cmc||0)-(b.card.cmc||0) || a.card.name.localeCompare(b.card.name)));
    return { order, g };
  }, [deckList]);

  function exportText() {
    const lines = [];
    if (deck.commander) lines.push('1 ' + deck.commander.name + ' *CMDR*');
    deckList.forEach(e => lines.push(e.qty + ' ' + e.card.name));
    return lines.join('\n');
  }
  function copyExport() {
    const txt = exportText();
    const done = () => showToast('Copied to clipboard!');
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(txt).then(done, () => {});
      return;
    }
    const area = document.createElement('textarea');
    area.value = txt;
    area.setAttribute('readonly', '');
    area.style.position = 'fixed';
    area.style.opacity = '0';
    document.body.appendChild(area);
    area.select();
    try {
      if (document.execCommand('copy')) done();
    } finally {
      document.body.removeChild(area);
    }
  }

  const ciColors = deck.commander ? (deck.commander.color_identity || []) : [];

  return (
    <div className="screen">
      <div className="deck-screen">
        {/* commander banner */}
        <div className="cmdr-banner">
          {deck.commander ? (
            <img className="cmdr-art" src={cardImage(deck.commander,'art_crop') || cardImage(deck.commander,'small')} alt="" onClick={() => onOpenDetail(deck.commander)} />
          ) : (
            <div className="cmdr-art empty">&#9876;</div>
          )}
          <div className="cmdr-info">
            <div className="cmdr-label">Commander</div>
            {deck.commander ? (
              <>
                <div className="cmdr-name">{deck.commander.name}</div>
                <div className="cmdr-sub">
                  <span className="ci-pips">{ciColors.length ? ciColors.map(c => <span key={c} className={'pip '+c}>{c}</span>) : <span className="pip C">◇</span>}</span>
                  <span onClick={onClearCommander} style={{color:'var(--gold-dim)',cursor:'pointer'}}>change</span>
                </div>
              </>
            ) : (
              <div className="cmdr-name" style={{fontSize:'14px',color:'var(--muted)',fontWeight:400}}>Tap a legendary creature → Set as Commander</div>
            )}
          </div>
        </div>

        {/* count hero */}
        <div className="deck-count-hero">
          <span className={'deck-count-num ' + (deckTotal>100?'over':'')}>{deckTotal}</span>
          <span className="deck-count-target">/ 100</span>
        </div>
        <div className="deck-count-label" style={{textAlign:'center',marginTop:'-12px',marginBottom:'16px'}}>
          {deckTotal === 100 ? 'Complete deck!' : deckTotal < 100 ? (100-deckTotal) + ' cards to go' : (deckTotal-100) + ' over limit'}
        </div>

        {/* actions */}
        <div className="deck-actions">
          <button className="deck-action" onClick={onGoSearch}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Add Cards
          </button>
          <button className="deck-action" onClick={() => { onDrawHand(); }}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="6" width="9" height="13" rx="1.5"/><rect x="13" y="6" width="9" height="13" rx="1.5"/><path d="M6.5 6V4M17.5 6V4"/></svg>Playtest
          </button>
          <button className="deck-action" onClick={() => { setShowExport(true); haptic(); }}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3v12M8 11l4 4 4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>Export
          </button>
          {deck.commander && (
            <a className="deck-action" href={'https://edhrec.com/commanders/' + edhrecSlug(deck.commander.name)} target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>EDHREC
            </a>
          )}
        </div>

        {deckList.length === 0 && !deck.commander ? (
          <div className="state-msg" style={{padding:'30px 20px'}}><div>Your deck is empty. Add cards from Search.</div></div>
        ) : (
          <>
            {/* curve */}
            <div className="stat-card">
              <div className="stat-title">Mana Curve <span className="stat-extra">avg {stats.avgMv.toFixed(2)}</span></div>
              <div className="curve">
                {stats.buckets.map((count, i) => (
                  <div key={i} className="curve-col">
                    <div className="curve-bar-wrap">
                      <div className="curve-bar" style={{height: (count/stats.maxBucket*100)+'%'}}>
                        {count>0 && <span className="cb-count">{count}</span>}
                      </div>
                    </div>
                    <div className="curve-x">{i===7?'7+':i}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* colors */}
            <div className="stat-card">
              <div className="stat-title">Color Breakdown</div>
              <div className="colorbar">
                {['W','U','B','R','G','C'].map(c => stats.colorCount[c]>0 && (
                  <div key={c} className="colorbar-seg" style={{width:(stats.colorCount[c]/stats.totalColorPips*100)+'%', background: COLOR_VAR[c]}}></div>
                ))}
              </div>
              <div className="color-legend">
                {['W','U','B','R','G','C'].map(c => stats.colorCount[c]>0 && (
                  <div key={c} className="color-legend-item"><span className={'pip '+c}>{c==='C'?'◇':c}</span>{COLOR_NAME[c]} · {stats.colorCount[c]}</div>
                ))}
              </div>
            </div>

            {/* types */}
            <div className="stat-card">
              <div className="stat-title">Type Counts</div>
              <div className="type-grid">
                {Object.entries(stats.types).filter(([t,n])=>n>0).map(([t,n]) => (
                  <div key={t} className="type-row"><span className="tr-label">{t}{n!==1?'s':''}</span><span className="tr-count">{n}</span></div>
                ))}
              </div>
            </div>

            {/* price */}
            <div className="stat-card">
              <div className="stat-title">Estimated Price</div>
              <div style={{fontFamily:'Cinzel',fontSize:'26px',color:'var(--gold-bright)',textAlign:'center'}}>
                ${stats.price.toFixed(2)} <span style={{fontSize:'13px',color:'var(--muted)'}}>USD</span>
              </div>
              <div style={{fontSize:'11px',color:'var(--muted2)',textAlign:'center',marginTop:'4px',fontStyle:'italic'}}>based on Scryfall market prices</div>
            </div>

            {/* card list */}
            {deck.commander && (
              <>
                <div className="deck-section-head"><span>Commander</span><span>1</span></div>
                <DeckLine entry={{card:deck.commander, qty:1}} isCommander onOpenDetail={onOpenDetail} onChangeQty={()=>{}} onRemove={()=>onClearCommander()} ciViolation={ciViolation} />
              </>
            )}
            {groups.order.filter(o => o!=='Commander' && groups.g[o].length).map(cat => {
              const arr = groups.g[cat];
              const subtotal = arr.reduce((s,e)=>s+e.qty,0);
              return (
                <div key={cat}>
                  <div className="deck-section-head"><span>{cat}{subtotal!==1?'s':''}</span><span>{subtotal}</span></div>
                  {arr.map(e => (
                    <DeckLine key={cardKey(e.card)} entry={e} onOpenDetail={onOpenDetail} onChangeQty={onChangeQty} onRemove={onRemove} ciViolation={ciViolation} />
                  ))}
                </div>
              );
            })}
          </>
        )}
      </div>

      {showExport && <ExportModal text={exportText()} onCopy={copyExport} onClose={() => setShowExport(false)} />}
    </div>
  );
}

function DeckLine({ entry, isCommander, onOpenDetail, onChangeQty, onRemove, ciViolation }) {
  const { card, qty } = entry;
  const multi = allowsMultiples(card);
  const violation = !isCommander && ciViolation(card);
  return (
    <div className="deck-line">
      <span className="dl-qty">{qty}{multi?'×':''}</span>
      <span className="dl-name" onClick={() => onOpenDetail(card)} style={violation?{color:'var(--red-bad)'}:{}}>
        {violation?'⚠ ':''}{card.name}
      </span>
      <span className="dl-mana"><ManaPips cost={cardMana(card)} /></span>
      {!isCommander ? (
        <div className="dl-controls">
          {multi && <button className="dl-btn" onClick={() => onChangeQty(cardKey(card), -1)}>−</button>}
          {multi && <button className="dl-btn" onClick={() => onChangeQty(cardKey(card), +1)}>+</button>}
          <button className="dl-btn" onClick={() => onRemove(cardKey(card))} style={{color:'var(--red-bad)'}}>×</button>
        </div>
      ) : (
        <div className="dl-controls"><button className="dl-btn" onClick={() => onRemove(cardKey(card))} style={{color:'var(--red-bad)'}}>×</button></div>
      )}
    </div>
  );
}

function edhrecSlug(name) {
  return name.toLowerCase().replace(/[',]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}

// ============ DECKS LIST SCREEN ============
function DecksScreen({ decks, activeDeckId, onSelect, onCreate, onDelete, onImport }) {
  const [showNew, setShowNew] = useState(false);
  const [confirmDel, setConfirmDel] = useState(null);
  const [showImport, setShowImport] = useState(false);

  function deckMeta(d) {
    const total = Object.values(d.cards).reduce((s,e)=>s+e.qty,0) + (d.commander?1:0);
    const ci = d.commander ? (d.commander.color_identity||[]) : [];
    return { total, ci };
  }

  return (
    <div className="screen">
      <div className="decks-screen">
        <div style={{display:'flex',gap:'9px',marginBottom:'16px'}}>
          <button className="new-deck-btn" style={{marginBottom:0,flex:1}} onClick={() => { setShowNew(true); haptic(); }}>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>
            New Deck
          </button>
          <button className="new-deck-btn" style={{marginBottom:0,flex:1}} onClick={() => { setShowImport(true); haptic(); }}>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 15V3M8 7l4-4 4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>

          <div className="state-msg"><div className="symbol">&#9876;</div><div>No decks yet. Create one to start brewing.</div></div>
        ) : (
          decks.map(d => {
            const m = deckMeta(d);
            return (
              <div key={d.id} className={'deck-card-item ' + (d.id===activeDeckId?'active-deck':'')} onClick={() => onSelect(d.id)}>
                {d.commander ? (
                  <img className="dci-art" src={cardImage(d.commander,'art_crop')||cardImage(d.commander,'small')} alt="" />
                ) : <div className="dci-art empty">&#9876;</div>}
                <div className="dci-info">
                  <div className="dci-name">{d.name}</div>
                  <div className="dci-meta">
                    <span>{m.total} cards</span>
                    {d.commander && <span className="ci-pips">{m.ci.length?m.ci.map(c=><span key={c} className={'pip '+c}>{c}</span>):<span className="pip C">◇</span>}</span>}
                  </div>
                </div>
                <button className="dl-btn" style={{color:'var(--red-bad)',width:'32px',height:'32px'}} onClick={(e) => { e.stopPropagation(); setConfirmDel(d); }}>
                  <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
                </button>
              </div>
            );
          })
        )}
      </div>

      {showNew && <NameModal title="Name Your Deck" placeholder="e.g. Atraxa Superfriends" onSave={(name) => { onCreate(name); setShowNew(false); }} onClose={() => setShowNew(false)} />}
      {showImport && <ImportModal onImport={onImport} onClose={() => setShowImport(false)} onSelectNew={() => setShowImport(false)} />}
      {confirmDel && (
        <div className="modal-backdrop" onClick={() => setConfirmDel(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Delete "{confirmDel.name}"?</div>
            <div style={{textAlign:'center',color:'var(--muted)',marginBottom:'18px',fontSize:'14px'}}>This can't be undone.</div>
            <div className="modal-btns">
              <button className="modal-btn secondary" onClick={() => setConfirmDel(null)}>Cancel</button>
              <button className="modal-btn primary" style={{background:'var(--red-bad)',borderColor:'var(--red-bad)',color:'#fff'}} onClick={() => { onDelete(confirmDel.id); setConfirmDel(null); }}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============ DETAIL OVERLAY ============
function DetailOverlay({ card, onClose, onAdd, onSetCommander, inDeck, isCommander, ciViolation }) {
  const [faceIdx, setFaceIdx] = useState(0);
  const startX = useRef(0), startY = useRef(0);
  const faces = (card.card_faces && card.card_faces.length > 1 && card.card_faces[0].oracle_text !== undefined) ? card.card_faces : null;
  const face = faces ? faces[faceIdx] : null;
  const oracle = face ? face.oracle_text : (card.oracle_text||'');
  const flavor = face ? face.flavor_text : card.flavor_text;
  const type = face ? face.type_line : card.type_line;
  const mana = face ? face.mana_cost : (card.mana_cost||'');
  const power = face ? face.power : card.power;
  const tough = face ? face.toughness : card.toughness;
  const loy = face ? face.loyalty : card.loyalty;
  const faceImg = (faces && faces[faceIdx].image_uris) ? faces[faceIdx].image_uris.large : cardImage(card,'large');
  const prices = card.prices || {};
  const rar = (card.rarity||'').toLowerCase();
  const commanderSources = [card].concat(card.card_faces || []);
  const canBeCommander = commanderSources.some(part =>
    ((part.type_line||'').includes('Legendary') && (part.type_line||'').includes('Creature')) ||
    (part.oracle_text||'').toLowerCase().includes('can be your commander')
  );
  const violation = ciViolation(card);

  const fmtOrder = ['standard','pioneer','modern','legacy','vintage','commander','pauper'];
  const legal = card.legalities ? fmtOrder.filter(f => card.legalities[f] === 'legal') : [];

  function touchEnd(e) {
    const dx = e.changedTouches[0].clientX - startX.current;
    const dy = e.changedTouches[0].clientY - startY.current;
    if (startX.current < 50 && dx > 90 && Math.abs(dy) < 60) onClose();
  }

  return (
    <div className="detail-overlay"
      onTouchStart={e => { startX.current = e.touches[0].clientX; startY.current = e.touches[0].clientY; }}
      onTouchEnd={touchEnd}>
      <div className="detail-header">
        <button className="back-btn" onClick={onClose}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m15 18-6-6 6-6"/></svg> Back
        </button>
        <div className="detail-title">{card.name}</div>
      </div>
      <div className="detail-scroll">
        {faces && (
          <div className="detail-face-toggle">
            {faces.map((f,i) => <button key={i} className={'face-btn ' + (i===faceIdx?'active':'')} onClick={() => setFaceIdx(i)}>{f.name}</button>)}
          </div>
        )}
        {faceImg && <img className="detail-card-img" src={faceImg} alt={card.name} />}
        <div className="detail-name">{face?face.name:card.name}</div>
        {mana && <div className="detail-mana-row"><ManaPips cost={mana} /></div>}

        {/* deck actions */}
        <div className="detail-deck-actions">
          <button className={'dda-btn ' + (inDeck?'secondary':'primary')} onClick={() => onAdd(card)}>
            {inDeck ? '✓ In Deck' : '+ Add to Deck'}
          </button>
          {canBeCommander && (
            <button className={'dda-btn ' + (isCommander?'secondary':'cmdr')} onClick={() => onSetCommander(card)}>
              {isCommander ? '✓ Commander' : '\u2694 Set Commander'}
            </button>
          )}
        </div>

// ============ PLAYTEST BOARD ============
function PlaytestBoard({ deck, deckList, onClose }) {
  // zones hold instances: { uid, card }
  const [library, setLibrary] = useState([]);
  const [hand, setHand] = useState([]);
  const [battlefield, setBattlefield] = useState([]); // nonland permanents
  const [lands, setLands] = useState([]); // land permanents (separate row)
  const [graveyard, setGraveyard] = useState([]);
  const [exile, setExile] = useState([]);
  const [tapped, setTapped] = useState({}); // uid -> bool
  const [life, setLife] = useState(40);
  const [menuCard, setMenuCard] = useState(null); // { inst, zone }
  const [viewZone, setViewZone] = useState(null); // 'graveyard' | 'exile' | 'library' | null
  const uidRef = useRef(0);

  function buildPool() {
    const pool = [];
    deckList.forEach(e => { for (let i=0;i<e.qty;i++) pool.push({ uid: 'u'+(uidRef.current++), card: e.card }); });
    return pool;
  }
  function shuffle(arr) { const a = [...arr]; for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

  function newGame() {
    let pool = shuffle(buildPool());
    const h = pool.slice(0,7);
    setHand(h); setLibrary(pool.slice(7));
    setBattlefield([]); setLands([]); setGraveyard([]); setExile([]); setTapped({}); setLife(40);
    haptic();
  }
  useEffect(() => { newGame(); }, []);

  function draw(n=1) {
    setLibrary(prevLib => {
      const lib = [...prevLib];
      const drawn = lib.splice(0, n);
      if (drawn.length) setHand(h => [...h, ...drawn]);
      else showLocal('Library empty');
      return lib;
    });
    haptic();
  }
  function mulligan() { newGame(); }

  const [localToast, setLocalToast] = useState('');
  function showLocal(m){ setLocalToast(m); setTimeout(()=>setLocalToast(''), 1600); }

  function isLand(card){ return (card.type_line||'').includes('Land'); }

  // remove instance from any zone
  function pluck(uid) {
    setHand(z => z.filter(x => x.uid !== uid));
    setBattlefield(z => z.filter(x => x.uid !== uid));
    setLands(z => z.filter(x => x.uid !== uid));
    setGraveyard(z => z.filter(x => x.uid !== uid));
    setExile(z => z.filter(x => x.uid !== uid));
    setLibrary(z => z.filter(x => x.uid !== uid));
  }
  function moveTo(inst, zone) {
    pluck(inst.uid);
    const adder = { hand:setHand, battlefield:setBattlefield, lands:setLands, graveyard:setGraveyard, exile:setExile }[zone];
    if (zone === 'battlefield' && isLand(inst.card)) { setLands(z => [...z, inst]); }
    else if (adder) adder(z => [...z, inst]);
    if (zone === 'graveyard' || zone === 'exile' || zone === 'hand') setTapped(t => { const n={...t}; delete n[inst.uid]; return n; });
    haptic();
  }
  function toLibraryTop(inst){ pluck(inst.uid); setLibrary(z => [inst, ...z]); setTapped(t=>{const n={...t};delete n[inst.uid];return n;}); haptic(); }
  function toLibraryBottom(inst){ pluck(inst.uid); setLibrary(z => [...z, inst]); setTapped(t=>{const n={...t};delete n[inst.uid];return n;}); haptic(); }

  // tap a hand card => play (battlefield/lands). tap a battlefield card => toggle tapped. long-press => menu.
  const pressTimer = useRef(null);
  const longPressTriggered = useRef(false);

  function playFromHand(inst) {
    if (longPressTriggered.current) return;
    moveTo(inst, 'battlefield');
  }
  function toggleTap(uid) {
    if (longPressTriggered.current) return;
    setTapped(t => ({ ...t, [uid]: !t[uid] }));
    haptic();
  }
  function untapAll() { setTapped({}); haptic(); showLocal('Untapped all'); }

  // long-press handling
  function startPress(inst, zone) {
    longPressTriggered.current = false;
    pressTimer.current = setTimeout(() => {
      longPressTriggered.current = true;
      setMenuCard({ inst, zone });
      haptic();
      setTimeout(() => { longPressTriggered.current = false; }, 400);
    }, 420);
  }
  function endPress() { clearTimeout(pressTimer.current); }

  function renderCardImg(inst) {
    const img = cardImage(inst.card,'normal');
    return img ? <img src={img} alt={inst.card.name} /> : <div className="pt-card-ph">{inst.card.name}</div>;
  }

  return (
    <div className="pt-overlay">
      <div className="pt-topbar">
        <button className="pt-close" onClick={onClose}>✕ Exit</button>
        <div className="pt-stat lib" onClick={() => { setViewZone('library'); }}>Lib <b>{library.length}</b></div>
        <div className="pt-stat" onClick={() => graveyard.length && setViewZone('graveyard')} style={{cursor: graveyard.length?'pointer':'default'}}>GY <b>{graveyard.length}</b></div>
        <div className="pt-stat" onClick={() => exile.length && setViewZone('exile')} style={{cursor: exile.length?'pointer':'default'}}>Exile <b>{exile.length}</b></div>
        <div className="pt-spacer"></div>
        <div className="pt-life">
          <div className="pt-life-btn" onClick={() => setLife(l=>l-1)}>−</div>
          <div className="pt-life-num">{life}</div>
          <div className="pt-life-btn" onClick={() => setLife(l=>l+1)}>+</div>
        </div>
      </div>

      <div className="pt-board">
        {/* battlefield (nonland) */}
        <div className="pt-zone battlefield">
          <div className="pt-zone-head">Battlefield <span className="zc">· {battlefield.length}</span></div>
          {battlefield.length === 0 ? (
            <div style={{color:'var(--muted2)',fontStyle:'italic',fontSize:'12px',padding:'10px 4px'}}>Tap a card in hand to play it here.</div>
          ) : (
            <div className="pt-grid big">
              {battlefield.map(inst => (
                <div key={inst.uid} className={'pt-card ' + (tapped[inst.uid]?'tapped':'')}
                  onClick={() => toggleTap(inst.uid)}
                  onTouchStart={() => startPress(inst,'battlefield')} onTouchEnd={endPress} onTouchCancel={endPress} onTouchMove={endPress}>
                  {renderCardImg(inst)}
                  {tapped[inst.uid] && <span className="tap-dot"></span>}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* lands row */}
        <div className="pt-zone lands-row">
          <div className="pt-zone-head">Lands <span className="zc">· {lands.length}</span></div>
          {lands.length === 0 ? (
            <div style={{color:'var(--muted2)',fontStyle:'italic',fontSize:'12px',padding:'6px 4px'}}>Lands you play appear here.</div>
          ) : (
            <div className="pt-grid">
              {lands.map(inst => (
                <div key={inst.uid} className={'pt-card ' + (tapped[inst.uid]?'tapped':'')}
                  onClick={() => toggleTap(inst.uid)}
                  onTouchStart={() => startPress(inst,'lands')} onTouchEnd={endPress} onTouchCancel={endPress} onTouchMove={endPress}>
                  {renderCardImg(inst)}
                  {tapped[inst.uid] && <span className="tap-dot"></span>}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* hand */}
      <div className="pt-hand-zone">
        <div className="pt-actionbar">
          <button className="pt-act primary" onClick={() => draw(1)}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3v12M8 11l4 4 4-4M5 21h14"/></svg>Draw
          </button>
          <button className="pt-act" onClick={untapAll}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5"/></svg>Untap
          </button>
          <button className="pt-act" onClick={mulligan}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5"/></svg>Mulligan
          </button>
        </div>
        <div className="pt-zone-head" style={{margin:'10px 0 6px'}}>Hand <span className="zc">· {hand.length}</span></div>
        <div className="pt-hand-scroll">
          {hand.length === 0 ? <div className="pt-hand-empty">Hand is empty — draw a card.</div> :
            hand.map(inst => (
              <div key={inst.uid} className="pt-hand-card"
                onClick={() => playFromHand(inst)}
                onTouchStart={() => startPress(inst,'hand')} onTouchEnd={endPress} onTouchCancel={endPress} onTouchMove={endPress}>
                {renderCardImg(inst)}
              </div>
            ))
          }
        </div>
      </div>

      {/* card action menu */}
      {menuCard && (
        <div className="pt-menu-backdrop" onClick={() => setMenuCard(null)}>
          <div className="pt-menu" onClick={e=>e.stopPropagation()}>
            <div className="pt-menu-card">
              <img src={cardImage(menuCard.inst.card,'small')} alt="" />
              <div className="nm">{menuCard.inst.card.name}</div>
            </div>
            {menuCard.zone !== 'hand' && <div className="pt-menu-opt" onClick={() => { moveTo(menuCard.inst,'hand'); setMenuCard(null); }}><span className="ic">✋</span>Return to Hand</div>}
            {(menuCard.zone === 'hand') && <div className="pt-menu-opt" onClick={() => { moveTo(menuCard.inst,'battlefield'); setMenuCard(null); }}><span className="ic">⚔</span>Play to Battlefield</div>}
            <div className="pt-menu-opt" onClick={() => { moveTo(menuCard.inst,'graveyard'); setMenuCard(null); }}><span className="ic">⚰</span>To Graveyard</div>
            <div className="pt-menu-opt" onClick={() => { moveTo(menuCard.inst,'exile'); setMenuCard(null); }}><span className="ic">✦</span>To Exile</div>
            <div className="pt-menu-opt" onClick={() => { toLibraryTop(menuCard.inst); setMenuCard(null); }}><span className="ic">⬆</span>Top of Library</div>
            <div className="pt-menu-opt" onClick={() => { toLibraryBottom(menuCard.inst); setMenuCard(null); }}><span className="ic">⬇</span>Bottom of Library</div>
            <div className="pt-menu-opt cancel" onClick={() => setMenuCard(null)}>Cancel</div>
          </div>
        </div>
      )}

      {/* zone viewer (graveyard / exile / library) */}
      {viewZone && (
        <ZoneViewer
          title={viewZone[0].toUpperCase()+viewZone.slice(1)}
          insts={viewZone==='graveyard'?graveyard:viewZone==='exile'?exile:library}
          shuffleLibrary={viewZone==='library' ? () => { setLibrary(l => shuffle(l)); showLocal('Shuffled'); } : null}
          onPick={(inst) => { setMenuCard({ inst, zone: viewZone }); }}
          onClose={() => setViewZone(null)}
        />
      )}

      {localToast && <div className="toast">{localToast}</div>}
    </div>
  );
}
