// ============ FILTER SHEET ============
function FilterSheet({ filters, setFilters, onApply, onClose }) {
  const [local, setLocal] = useState(() => ({
    colors: new Set(filters.colors), colorMode: filters.colorMode, types: new Set(filters.types),
    subtype: filters.subtype, oracle: filters.oracle, cmc: [...filters.cmc], pow: [...filters.pow], tou: [...filters.tou], rarities: new Set(filters.rarities)
  }));

  const TYPES = ['creature','instant','sorcery','enchantment','artifact','planeswalker','land','legendary'];
  const RARITIES = ['common','uncommon','rare','mythic'];

  function toggleColor(c) {
    const s = new Set(local.colors);
    if (c === 'C') {
      if (s.has('C')) s.delete('C');
      else { s.clear(); s.add('C'); }
    } else {
      s.delete('C');
      s.has(c) ? s.delete(c) : s.add(c);
    }
    setLocal({...local, colors:s});
    haptic();
  }
  function toggleType(t) { const s = new Set(local.types); s.has(t)?s.delete(t):s.add(t); setLocal({...local, types:s}); haptic(); }
  function toggleRarity(r) { const s = new Set(local.rarities); s.has(r)?s.delete(r):s.add(r); setLocal({...local, rarities:s}); haptic(); }

  function reset() { setLocal({ colors:new Set(), colorMode:'exact', types:new Set(), subtype:'', oracle:'', cmc:[0,16], pow:[0,16], tou:[0,16], rarities:new Set() }); haptic(); }
  function apply() { setFilters(local); onApply(local); }

  return (
    <>
      <div className="sheet-backdrop" onClick={onClose}></div>
      <div className="sheet">
        <div className="sheet-handle"></div>
        <div className="sheet-header">
          <span className="sheet-action reset" onClick={reset}>Reset</span>
          <span className="sheet-title">Filters</span>
          <span className="sheet-action" onClick={onClose}>Done</span>
        </div>
        <div className="sheet-body">
          <div className="fgroup">
            <div className="fgroup-label">Colors</div>
            <div className="color-grid">
              {COLORS.map(({c,sym}) => (
                <div key={c} className={'color-btn ' + (local.colors.has(c)?'sel':'')} data-color={c} onClick={() => toggleColor(c)}>
                  <div className="cpip">{sym}</div>
                </div>
              ))}
            </div>
            <div className="color-mode">
              {[['exact','Exactly'],['incl','Includes'],['atmost','At most']].map(([m,l]) => (
                <div key={m} className={'mode-pill ' + (local.colorMode===m?'sel':'')} onClick={() => setLocal({...local, colorMode:m})}>{l}</div>
              ))}
            </div>
          </div>

          <div className="fgroup">
            <div className="fgroup-label">Card Type</div>
            <div className="pill-wrap">
              {TYPES.map(t => <div key={t} className={'opt-pill ' + (local.types.has(t)?'sel':'')} onClick={() => toggleType(t)}>{t.charAt(0).toUpperCase()+t.slice(1)}</div>)}
            </div>
          </div>

          <div className="fgroup">
            <div className="fgroup-label">Subtype / Keyword <span className="hint">e.g. Dragon, Goblin</span></div>
            <input className="filter-text-input" type="text" value={local.subtype} placeholder="Creature subtype..." autoCapitalize="words" autoCorrect="off" onChange={e => setLocal({...local, subtype:e.target.value})} />
          </div>

          <div className="fgroup">
            <div className="fgroup-label">Oracle Text <span className="hint">words on the card</span></div>
            <input className="filter-text-input" type="text" value={local.oracle} placeholder="e.g. draw a card, flying..." autoCapitalize="off" autoCorrect="off" onChange={e => setLocal({...local, oracle:e.target.value})} />
          </div>

          <div className="fgroup">
            <div className="fgroup-label">Numbers</div>
            <RangeSlider label="Mana Value" value={local.cmc} onChange={v => setLocal({...local, cmc:v})} />
            <RangeSlider label="Power" value={local.pow} onChange={v => setLocal({...local, pow:v})} />
            <RangeSlider label="Toughness" value={local.tou} onChange={v => setLocal({...local, tou:v})} />
          </div>

          <div className="fgroup">
            <div className="fgroup-label">Rarity</div>
            <div className="pill-wrap">
              {RARITIES.map(r => <div key={r} className={'opt-pill ' + (local.rarities.has(r)?'sel':'')} onClick={() => toggleRarity(r)}>{r.charAt(0).toUpperCase()+r.slice(1)}</div>)}
            </div>
          </div>
        </div>
        <div className="apply-bar"><button className="apply-btn" onClick={apply}>Search</button></div>
      </div>
    </>
  );
}

function RangeSlider({ label, value, onChange }) {
  const [lo, hi] = value;
  function setLo(v) { v = Math.min(+v, hi); onChange([v, hi]); }
  function setHi(v) { v = Math.max(+v, lo); onChange([lo, v]); }
  const txt = (lo===0 && hi===16) ? 'Any' : (lo===hi ? ''+lo : lo + ' – ' + (hi===16?'16+':hi));
  return (
    <div className="range-block">
      <div className="range-head"><span className="range-name">{label}</span><span className="range-val">{txt}</span></div>
      <div className="dual-range">
        <div className="range-track"></div>
        <div className="range-fill" style={{left:(lo/16*100)+'%', right:(100-hi/16*100)+'%'}}></div>
        <input type="range" min="0" max="16" value={lo} className="r-min" onChange={e => setLo(e.target.value)} />
        <input type="range" min="0" max="16" value={hi} className="r-max" onChange={e => setHi(e.target.value)} />
      </div>
    </div>
  );
}

function ImportModal({ onImport, onClose }) {
  const [text, setText] = useState('');
  const [status, setStatus] = useState({ kind:'', msg:'' });
  const [busy, setBusy] = useState(false);

  function run() {
    if (!text.trim() || busy) return;
    setBusy(true);
    setStatus({ kind:'work', msg:'Parsing list...' });
    onImport(
      text,
      (m) => setStatus({ kind:'work', msg:m }),
      (res) => {
        setBusy(false);
        if (res.ok) {
          setStatus({ kind:'ok', msg:res.msg });
          setTimeout(() => onClose(), 900);
        } else {
          setStatus({ kind:'err', msg:res.msg });
        }
      }
    );
  }

  return (
    <div className="modal-backdrop" onClick={() => !busy && onClose()}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Import Deck List</div>
        <div className="import-hint">Paste a list — one card per line. Quantities are honored, so basics, Relentless Rats, etc. work. Mark your commander with <b>*CMDR*</b>.</div>
        <textarea className="modal-textarea" value={text} placeholder={"1 Sol Ring\n1 Arcane Signet\n38 Forest\n4 Relentless Rats\n1 Prossh, Skyraider of Kher *CMDR*"} autoCapitalize="none" autoCorrect="off" spellCheck="false" onChange={e => setText(e.target.value)}></textarea>
        {status.msg && <div className={'import-status ' + status.kind}>{status.msg}</div>}
        <div className="modal-btns">
          <button className="modal-btn secondary" onClick={() => !busy && onClose()}>Cancel</button>
          <button className="modal-btn primary" onClick={run} style={busy?{opacity:.6}:{}}>{busy?'Importing...':'Import'}</button>
        </div>
      </div>
    </div>
  );
}

// ============ MOUNT ============
try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  window.__oracleMounted = true;
} catch (error) {
  if (window.__oracleShowBootFailure) window.__oracleShowBootFailure('A startup error occurred.');
  throw error;
}
</script>
</body>
</html>
