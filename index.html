<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Oracle">
<meta name="theme-color" content="#0a0a0f">
<title>Oracle — Commander Deck Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --bg2: #0d0d14; --surface: #14141d; --surface2: #1c1c28; --surface3: #25253480;
    --border: #2a2a3d; --border-light: #36364d;
    --gold: #c9a84c; --gold-bright: #e0c46a; --gold-dim: #8a6f2e; --gold-glow: rgba(201,168,76,0.16);
    --text: #e8e0cc; --muted: #82796a; --muted2: #5a5448; --white: #f5f0e8;
    --w: #f4e9c1; --u: #4b8fd6; --b: #9a7fb0; --r: #d8523f; --g: #4fa86e; --c: #b0a99a;
    --green-ok: #4fa86e; --red-bad: #d8523f;
    --radius: 16px; --radius-sm: 11px; --card-radius: 14px;
    --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; font-size: 16px; -webkit-font-smoothing: antialiased; }
  body { user-select: none; }
  #root { height: 100dvh; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 70% 35% at 50% -5%, rgba(201,168,76,0.08), transparent 65%), radial-gradient(ellipse 90% 50% at 15% 110%, rgba(75,143,214,0.05), transparent 55%), radial-gradient(ellipse 80% 50% at 90% 105%, rgba(216,82,63,0.04), transparent 55%); pointer-events: none; z-index: 0; }

  .app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; max-width: 540px; margin: 0 auto; width: 100%; }

  /* tabs */
  .topbar { padding: calc(var(--sat) + 10px) 16px 0; flex-shrink: 0; background: linear-gradient(to bottom, rgba(10,10,15,0.97), rgba(13,13,20,0.92)); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
  .brand { font-family: 'Cinzel'; font-size: 16px; font-weight: 700; letter-spacing: 0.2em; color: var(--gold); text-align: center; text-shadow: 0 0 22px rgba(201,168,76,0.35); margin-bottom: 8px; }
  .tabs { display: flex; gap: 4px; }
  .tab { flex: 1; text-align: center; padding: 11px 4px 12px; font-family: 'Cinzel'; font-size: 12.5px; letter-spacing: 0.06em; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: color .2s; position: relative; }
  .tab.active { color: var(--gold-bright); border-bottom-color: var(--gold); }
  .tab .badge { display: inline-block; min-width: 17px; height: 17px; line-height: 17px; padding: 0 4px; border-radius: 9px; background: var(--surface2); color: var(--muted); font-size: 10px; font-family: 'Crimson Pro'; margin-left: 4px; vertical-align: middle; }
  .tab.active .badge { background: var(--gold-glow); color: var(--gold-bright); }

  .screen { flex: 1; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
  .screen::-webkit-scrollbar { display: none; }

  /* search area */
  .search-area { padding: 12px 14px 8px; flex-shrink: 0; background: rgba(10,10,15,0.85); position: relative; }
  .search-row { display: flex; gap: 8px; align-items: center; }
  .search-wrap { position: relative; flex: 1; }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; color: var(--gold-dim); pointer-events: none; }
  .clear-icon { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  input.search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 36px 12px 38px; font-family: 'Crimson Pro'; font-size: 16px; color: var(--text); outline: none; transition: border-color .2s, box-shadow .2s; -webkit-appearance: none; }
  input.search-input:focus { border-color: var(--gold-dim); box-shadow: 0 0 0 3px var(--gold-glow); }
  input.search-input::placeholder { color: var(--muted2); }
  .icon-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--gold); border-radius: var(--radius); width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background .15s, transform .1s; -webkit-appearance: none; position: relative; }
  .icon-btn:active { transform: scale(.94); background: var(--border); }
  .icon-btn svg { width: 21px; height: 21px; }
  .icon-btn.active { background: var(--gold-glow); border-color: var(--gold-dim); color: var(--gold-bright); }
  .filter-badge { position: absolute; top: -5px; right: -5px; background: var(--gold); color: #1a1000; font-size: 10px; font-weight: 700; min-width: 17px; height: 17px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: 'Crimson Pro'; padding: 0 4px; }

  .autocomplete { position: absolute; left: 14px; right: 14px; top: calc(100% - 4px); background: var(--surface2); border: 1px solid var(--border-light); border-radius: var(--radius-sm); box-shadow: 0 12px 40px rgba(0,0,0,.6); z-index: 50; max-height: 260px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .ac-item { padding: 11px 16px; font-size: 15px; color: var(--text); cursor: pointer; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:active { background: var(--gold-glow); }
  .ac-item svg { width: 13px; height: 13px; color: var(--gold-dim); flex-shrink: 0; }

  .chip-row { display: flex; gap: 7px; overflow-x: auto; padding: 8px 0 3px; scrollbar-width: none; }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all .15s; -webkit-appearance: none; font-family: 'Crimson Pro'; }
  .chip.active { background: var(--gold-glow); border-color: var(--gold-dim); color: var(--gold-bright); }
  .chip:active { transform: scale(.95); }

  .results-pad { padding: 8px 12px calc(20px + var(--sab)); }
  .results-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 4px 12px; gap: 10px; }
  .results-meta { font-size: 13px; color: var(--muted); font-style: italic; flex: 1; }
  .sort-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 6px 11px; font-size: 12px; color: var(--gold); cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: 'Cinzel'; flex-shrink: 0; -webkit-appearance: none; }
  .sort-btn:active { background: var(--border); }
  .sort-btn svg { width: 13px; height: 13px; }

  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card-tile { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); overflow: hidden; position: relative; transition: transform .12s, box-shadow .15s; }
  .card-tile:active { transform: scale(.97); }
  .card-tile.in-deck { border-color: var(--gold-dim); box-shadow: 0 0 0 1px var(--gold-dim); }
  .card-img-wrap { width: 100%; aspect-ratio: 488/680; background: var(--surface2); overflow: hidden; position: relative; cursor: pointer; }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity .35s; }
  .card-img-wrap img.loaded { opacity: 1; }
  .img-skeleton { position: absolute; inset: 0; background: linear-gradient(100deg, var(--surface2) 30%, var(--surface3) 50%, var(--surface2) 70%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .card-img-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 14px; text-align: center; height: 100%; }
  .card-img-placeholder .pn { font-family: 'Cinzel'; font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .card-img-placeholder .pt { font-size: 11px; color: var(--muted); font-style: italic; }

  .card-footer { padding: 6px 8px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
  .card-name-small { font-family: 'Cinzel'; font-size: 10px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .add-btn { width: 28px; height: 28px; border-radius: 8px; background: var(--gold-glow); border: 1px solid var(--gold-dim); color: var(--gold-bright); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; cursor: pointer; flex-shrink: 0; -webkit-appearance: none; line-height: 1; padding-bottom: 2px; }
  .add-btn:active { transform: scale(.9); background: var(--gold); color: #1a1000; }
  .add-btn.added { background: var(--surface2); border-color: var(--border-light); color: var(--gold); }
  .qty-pill { position: absolute; top: 6px; right: 6px; background: rgba(10,10,15,.85); border: 1px solid var(--gold-dim); color: var(--gold-bright); font-family: 'Cinzel'; font-size: 12px; font-weight: 600; min-width: 24px; height: 24px; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 0 6px; backdrop-filter: blur(4px); }
  .cmdr-flag { position: absolute; top: 6px; left: 6px; background: rgba(201,168,76,.92); color: #1a1000; font-family: 'Cinzel'; font-size: 9px; font-weight: 700; letter-spacing: .05em; padding: 3px 7px; border-radius: 7px; }

  .pip { width: 15px; height: 15px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; font-family: 'Crimson Pro'; color: #1a1408; flex-shrink: 0; box-shadow: inset 0 -1px 2px rgba(0,0,0,.25); }
  .pip.W { background: var(--w); } .pip.U { background: var(--u); color:#fff; } .pip.B { background: var(--b); color:#fff; } .pip.R { background: var(--r); color:#fff; } .pip.G { background: var(--g); color:#fff; } .pip.C { background: var(--c); } .pip.generic { background: #5a5448; color: var(--text); } .pip.X { background: #5a5448; color: var(--text); } .pip.hybrid { background: linear-gradient(135deg,var(--gold) 50%,var(--u) 50%); }

  .state-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 30px; text-align: center; gap: 14px; color: var(--muted); font-style: italic; font-size: 15px; line-height: 1.5; }
  .state-msg .symbol { font-size: 40px; opacity: .35; }
  .state-msg em { color: var(--gold-dim); }
  .spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .load-more-btn { display: block; width: 100%; margin-top: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; color: var(--gold-dim); font-family: 'Cinzel'; font-size: 13px; letter-spacing: .06em; cursor: pointer; text-align: center; -webkit-appearance: none; }
  .load-more-btn:active { background: var(--border); color: var(--gold); }

  /* ===== DECK SCREEN ===== */
  .deck-screen { padding: 14px 14px calc(30px + var(--sab)); }
  .cmdr-banner { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; display: flex; gap: 13px; align-items: center; position: relative; overflow: hidden; }
  .cmdr-banner::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 50% 80% at 100% 50%, var(--gold-glow), transparent 70%); pointer-events: none; }
  .cmdr-art { width: 54px; height: 54px; border-radius: 11px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--gold-dim); box-shadow: 0 2px 10px rgba(0,0,0,.4); }
  .cmdr-art.empty { background: var(--surface3); display: flex; align-items: center; justify-content: center; color: var(--gold-dim); font-size: 22px; }
  .cmdr-info { flex: 1; min-width: 0; position: relative; }
  .cmdr-label { font-family: 'Cinzel'; font-size: 10px; letter-spacing: .12em; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 2px; }
  .cmdr-name { font-family: 'Cinzel'; font-size: 16px; font-weight: 600; color: var(--white); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cmdr-sub { font-size: 12px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ci-pips { display: inline-flex; gap: 2px; }

  .deck-count-hero { display: flex; align-items: baseline; justify-content: center; gap: 8px; margin: 6px 0 16px; }
  .deck-count-num { font-family: 'Cinzel'; font-size: 38px; font-weight: 700; color: var(--gold-bright); line-height: 1; text-shadow: 0 0 24px var(--gold-glow); }
  .deck-count-num.over { color: var(--red-bad); }
  .deck-count-target { font-family: 'Cinzel'; font-size: 17px; color: var(--muted); }
  .deck-count-label { font-size: 12px; color: var(--muted); font-style: italic; }

  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .stat-title { font-family: 'Cinzel'; font-size: 11px; letter-spacing: .09em; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .stat-title .stat-extra { color: var(--gold-dim); font-family: 'Crimson Pro'; text-transform: none; letter-spacing: 0; font-size: 12px; }

  /* curve chart */
  .curve { display: flex; align-items: flex-end; gap: 6px; height: 96px; }
  .curve-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; height: 100%; justify-content: flex-end; }
  .curve-bar-wrap { width: 100%; flex: 1; display: flex; align-items: flex-end; }
  .curve-bar { width: 100%; background: linear-gradient(to top, var(--gold-dim), var(--gold)); border-radius: 4px 4px 0 0; min-height: 2px; transition: height .4s cubic-bezier(.32,.72,0,1); position: relative; }
  .curve-bar .cb-count { position: absolute; top: -16px; left: 0; right: 0; text-align: center; font-size: 10px; color: var(--gold-bright); font-family: 'Cinzel'; }
  .curve-x { font-size: 11px; color: var(--muted); font-family: 'Cinzel'; }

  /* color bar */
  .colorbar { display: flex; height: 14px; border-radius: 7px; overflow: hidden; margin-bottom: 10px; background: var(--surface2); }
  .colorbar-seg { height: 100%; transition: width .4s; }
  .color-legend { display: flex; flex-wrap: wrap; gap: 10px 14px; }
  .color-legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text); }

  /* type grid */
  .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 11px; background: var(--surface2); border-radius: 9px; font-size: 14px; }
  .type-row .tr-label { color: var(--muted); }
  .type-row .tr-count { font-family: 'Cinzel'; color: var(--gold-bright); font-weight: 600; }

  .deck-actions { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .deck-action { flex: 1; min-width: calc(50% - 4px); text-align: center; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--gold); font-family: 'Cinzel'; font-size: 12px; letter-spacing: .03em; cursor: pointer; -webkit-appearance: none; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .deck-action:active { background: var(--border); }
  .deck-action svg { width: 14px; height: 14px; }
  .deck-action.danger { color: var(--red-bad); }

  /* deck card list */
  .deck-section-head { font-family: 'Cinzel'; font-size: 12px; letter-spacing: .08em; color: var(--gold-dim); text-transform: uppercase; margin: 16px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .deck-line { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 1px solid var(--border); }
  .deck-line:active { background: var(--surface); }
  .dl-qty { font-family: 'Cinzel'; font-size: 14px; color: var(--gold-bright); min-width: 26px; text-align: center; font-weight: 600; }
  .dl-name { flex: 1; font-size: 15px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .dl-mana { display: flex; gap: 2px; flex-shrink: 0; }
  .dl-controls { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .dl-btn { width: 26px; height: 26px; border-radius: 7px; background: var(--surface2); border: 1px solid var(--border); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; -webkit-appearance: none; line-height: 1; }
  .dl-btn:active { background: var(--border); transform: scale(.9); }
  .dl-warn { color: var(--red-bad); font-size: 11px; margin-left: 4px; }

  /* ===== DECKS LIST SCREEN ===== */
  .decks-screen { padding: 16px 14px calc(30px + var(--sab)); }
  .deck-card-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 11px; cursor: pointer; display: flex; gap: 13px; align-items: center; transition: border-color .15s; }
  .deck-card-item:active { border-color: var(--gold-dim); }
  .deck-card-item.active-deck { border-color: var(--gold-dim); box-shadow: 0 0 0 1px var(--gold-dim); }
  .dci-art { width: 46px; height: 46px; border-radius: 10px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border-light); }
  .dci-art.empty { background: var(--surface3); display: flex; align-items: center; justify-content: center; color: var(--gold-dim); font-size: 18px; }
  .dci-info { flex: 1; min-width: 0; }
  .dci-name { font-family: 'Cinzel'; font-size: 15px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dci-meta { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 8px; }
  .new-deck-btn { width: 100%; background: var(--gold-glow); border: 1px dashed var(--gold-dim); border-radius: var(--radius); padding: 15px; color: var(--gold-bright); font-family: 'Cinzel'; font-size: 13px; letter-spacing: .05em; cursor: pointer; -webkit-appearance: none; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .new-deck-btn:active { background: var(--gold-dim); color: #1a1000; }

  /* ===== SHEETS ===== */
  .sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); z-index: 90; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 95; background: var(--bg2); border-top-left-radius: 24px; border-top-right-radius: 24px; border-top: 1px solid var(--border-light); box-shadow: 0 -8px 40px rgba(0,0,0,.5); max-height: 88dvh; display: flex; flex-direction: column; max-width: 540px; margin: 0 auto; animation: sheetUp .32s cubic-bezier(.32,.72,0,1); }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle { width: 38px; height: 5px; background: var(--border-light); border-radius: 3px; margin: 10px auto 4px; flex-shrink: 0; }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sheet-title { font-family: 'Cinzel'; font-size: 16px; font-weight: 600; color: var(--gold); letter-spacing: .05em; }
  .sheet-action { font-size: 14px; color: var(--gold); cursor: pointer; font-family: 'Crimson Pro'; padding: 4px 6px; }
  .sheet-action.reset { color: var(--muted); }
  .sheet-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 18px calc(20px + var(--sab)); }
  .sheet-body::-webkit-scrollbar { display: none; }

  .fgroup { margin-bottom: 22px; }
  .fgroup-label { font-family: 'Cinzel'; font-size: 12px; letter-spacing: .09em; color: var(--muted); text-transform: uppercase; margin-bottom: 11px; display: flex; align-items: center; gap: 7px; }
  .fgroup-label .hint { font-family: 'Crimson Pro'; font-size: 11px; color: var(--muted2); text-transform: none; letter-spacing: 0; font-style: italic; }

  .color-grid { display: flex; gap: 9px; }
  .color-btn { flex: 1; aspect-ratio: 1; border-radius: 13px; border: 2px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; position: relative; }
  .color-btn:active { transform: scale(.92); }
  .color-btn .cpip { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; box-shadow: inset 0 -2px 3px rgba(0,0,0,.2); }
  .color-btn[data-color="W"] .cpip { background: var(--w); color:#1a1408; } .color-btn[data-color="U"] .cpip { background: var(--u); color:#fff; } .color-btn[data-color="B"] .cpip { background: var(--b); color:#fff; } .color-btn[data-color="R"] .cpip { background: var(--r); color:#fff; } .color-btn[data-color="G"] .cpip { background: var(--g); color:#fff; } .color-btn[data-color="C"] .cpip { background: var(--c); color:#1a1408; }
  .color-btn.sel { border-color: var(--gold); background: var(--gold-glow); box-shadow: 0 0 14px var(--gold-glow); }

  .range-block { margin-bottom: 16px; }

  .range-name { font-size: 14px; color: var(--text); }

  .dual-range input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; pointer-events: all; width: 24px; height: 24px; border-radius: 50%; background: var(--gold); border: 3px solid var(--bg2); box-shadow: 0 2px 6px rgba(0,0,0,.4); cursor: pointer; }

  .filter-text-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 14px; font-family: 'Crimson Pro'; font-size: 15px; color: var(--text); outline: none; -webkit-appearance: none; }

  .apply-btn { width: 100%; background: var(--gold); color: #1a1000; border: none; border-radius: var(--radius); padding: 15px; font-family: 'Cinzel'; font-size: 15px; font-weight: 600; letter-spacing: .06em; cursor: pointer; -webkit-appearance: none; transition: transform .1s; }
  .apply-btn:active { transform: scale(.98); background: #b8983e; }

  .sort-opt { display: flex; align-items: center; justify-content: space-between; padding: 14px 4px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 16px; color: var(--text); }

  /* detail */
  .detail-overlay { position: fixed; inset: 0; z-index: 100; background: var(--bg); display: flex; flex-direction: column; animation: slideIn .3s cubic-bezier(.32,.72,0,1); }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

  .back-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--gold); border-radius: 10px; padding: 9px 14px; font-family: 'Cinzel'; font-size: 13px; cursor: pointer; -webkit-appearance: none; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

  .detail-face-toggle { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; }
  .face-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 7px 16px; font-size: 13px; color: var(--muted); cursor: pointer; -webkit-appearance: none; font-family: 'Crimson Pro'; }

  .detail-name { font-family: 'Cinzel'; font-size: 21px; font-weight: 600; text-align: center; color: var(--white); margin-bottom: 5px; line-height: 1.25; }

  .dda-btn.primary:active { background: #b8983e; }
  .dda-btn.secondary { background: var(--surface2); color: var(--gold); }
  .dda-btn.secondary:active { background: var(--border); }
  .dda-btn.cmdr { background: var(--surface2); color: var(--gold-bright); }
  .detail-info { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
  .info-row { display: flex; padding: 11px 15px; border-bottom: 1px solid var(--border); align-items: flex-start; gap: 14px; }
  .info-row:last-child { border-bottom: none; }
  .info-label { font-size: 11px; letter-spacing: .07em; color: var(--muted); text-transform: uppercase; font-family: 'Cinzel'; min-width: 62px; padding-top: 2px; flex-shrink: 0; }
  .info-val { font-size: 15px; color: var(--text); line-height: 1.5; flex: 1; }
  .oracle-text { font-style: italic; white-space: pre-wrap; font-size: 15px; line-height: 1.7; }
  .flavor-text { font-style: italic; font-size: 13.5px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 9px; margin-top: 9px; line-height: 1.55; }
  .pt-badge { display: inline-block; background: var(--surface2); border: 1px solid var(--border-light); border-radius: 8px; padding: 3px 12px; font-family: 'Cinzel'; color: var(--gold-bright); font-size: 15px; }
  .rarity-common{color:#b0b0b0}.rarity-uncommon{color:#9ab8cc}.rarity-rare{color:var(--gold)}.rarity-mythic{color:#e07838}.rarity-special,.rarity-bonus{color:#c96fd4}
  .price-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .price-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 11px; font-size: 13px; color: var(--text); }
  .price-tag span { color: var(--muted); font-size: 10px; letter-spacing: .05em; text-transform: uppercase; margin-right: 5px; font-family: 'Cinzel'; }
  .detail-action-link { display: block; text-align: center; padding: 13px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--gold); font-family: 'Cinzel'; font-size: 12.5px; letter-spacing: .04em; text-decoration: none; margin-bottom: 9px; }
  .detail-action-link:active { background: var(--border); }
  .detail-action-link.edhrec { border-color: var(--gold-dim); color: var(--gold-bright); }

  /* test hand */
  .hand-overlay { position: fixed; inset: 0; z-index: 110; background: rgba(5,5,9,.96); display: flex; flex-direction: column; padding: calc(var(--sat) + 16px) 0 calc(var(--sab) + 16px); animation: fadeIn .25s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .hand-header { display: flex; align-items: center; justify-content: space-between; padding: 0 18px 14px; flex-shrink: 0; }
  .hand-title { font-family: 'Cinzel'; font-size: 17px; color: var(--gold-bright); letter-spacing: .05em; }
  .hand-close { background: var(--surface2); border: 1px solid var(--border); color: var(--gold); border-radius: 10px; padding: 8px 14px; font-family: 'Cinzel'; font-size: 13px; cursor: pointer; -webkit-appearance: none; }
  .hand-cards { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 11px; align-content: start; }
  .hand-cards::-webkit-scrollbar { display: none; }
  .hand-card { border-radius: 11px; overflow: hidden; border: 1px solid var(--border-light); aspect-ratio: 488/680; background: var(--surface2); }
  .hand-card img { width: 100%; height: 100%; object-fit: cover; }
  .hand-controls { display: flex; gap: 10px; padding: 16px 18px 0; flex-shrink: 0; }

  .hand-btn.secondary { background: var(--surface2); color: var(--gold); }

  /* toast */
  .toast { position: fixed; left: 50%; bottom: calc(28px + var(--sab)); transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--gold-dim); color: var(--gold-bright); padding: 11px 20px; border-radius: 30px; font-size: 14px; z-index: 200; box-shadow: 0 8px 30px rgba(0,0,0,.5); animation: toastIn .3s; max-width: 90%; text-align: center; font-family: 'Crimson Pro'; }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* name-deck modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 120; display: flex; align-items: center; justify-content: center; padding: 24px; animation: fadeIn .2s; }

  .modal-textarea { width: 100%; min-height: 160px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 15px; font-family: 'Crimson Pro'; font-size: 14px; color: var(--text); outline: none; -webkit-appearance: none; margin-bottom: 16px; resize: none; line-height: 1.5; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn { flex: 1; padding: 13px; border-radius: var(--radius-sm); font-family: 'Cinzel'; font-size: 13px; cursor: pointer; -webkit-appearance: none; border: 1px solid var(--border); }
  .modal-btn.primary { background: var(--gold); color: #1a1000; border-color: var(--gold); }
  .modal-btn.secondary { background: var(--surface2); color: var(--muted); }

  /* ===== PLAYTEST BOARD ===== */
  .pt-overlay { position: fixed; inset: 0; z-index: 115; background: #06060a; display: flex; flex-direction: column; padding-top: var(--sat); animation: fadeIn .2s; }
  .pt-overlay::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 90% 40% at 50% 0%, rgba(75,143,214,0.06), transparent 55%), radial-gradient(ellipse 90% 40% at 50% 100%, rgba(201,168,76,0.05), transparent 55%); pointer-events: none; }
  .pt-topbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; flex-shrink: 0; border-bottom: 1px solid var(--border); background: rgba(6,6,10,.9); backdrop-filter: blur(12px); position: relative; z-index: 2; }

  .pt-stat b { color: var(--gold-bright); font-weight: 600; }
  .pt-stat.lib { cursor: pointer; }

  .pt-spacer { flex: 1; }
  .pt-life { display: flex; align-items: center; gap: 6px; }
  .pt-life-btn { width: 26px; height: 26px; border-radius: 7px; background: var(--surface2); border: 1px solid var(--border); color: var(--gold); font-size: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-appearance: none; line-height: 1; }
  .pt-life-btn:active { background: var(--border); }
  .pt-life-num { font-family: 'Cinzel'; font-size: 18px; color: var(--gold-bright); min-width: 30px; text-align: center; font-weight: 600; }

  .pt-board { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; z-index: 1; display: flex; flex-direction: column; }
  .pt-board::-webkit-scrollbar { display: none; }

  .pt-zone { padding: 8px 10px; }
  .pt-zone-head { font-family: 'Cinzel'; font-size: 10px; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; margin-bottom: 7px; display: flex; align-items: center; gap: 7px; padding-left: 3px; }
  .pt-zone-head .zc { color: var(--gold-dim); }
  .pt-zone.battlefield { flex: 1; min-height: 230px; border-bottom: 1px solid var(--border); background: linear-gradient(to bottom, transparent, rgba(75,143,214,0.03)); }
  .pt-zone.lands-row { border-bottom: 1px solid var(--border); background: linear-gradient(to bottom, transparent, rgba(79,168,110,0.03)); }

  .pt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 7px; }
  .pt-grid.big { grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); }
  .pt-card { aspect-ratio: 488/680; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid var(--border-light); background: var(--surface2); cursor: pointer; transition: transform .12s; }
  .pt-card:active { transform: scale(.94); }
  .pt-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .pt-card-ph { display: flex; align-items: center; justify-content: center; text-align: center; padding: 4px; font-size: 9px; color: var(--text); font-family: 'Cinzel'; height: 100%; line-height: 1.2; }

  .pt-hand-zone { flex-shrink: 0; border-top: 1px solid var(--border-light); background: rgba(13,13,20,.96); backdrop-filter: blur(12px); padding: 8px 10px calc(8px + var(--sab)); position: relative; z-index: 3; }
  .pt-hand-scroll { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .pt-hand-scroll::-webkit-scrollbar { display: none; }

  .pt-hand-card:active { transform: translateY(-6px) scale(1.03); }
  .pt-hand-card img { width: 100%; height: 100%; object-fit: cover; }
  .pt-hand-empty { color: var(--muted2); font-style: italic; font-size: 13px; padding: 20px; text-align: center; width: 100%; }

  .pt-actionbar { display: flex; gap: 7px; padding: 8px 10px 0; }
  .pt-act { flex: 1; padding: 12px 6px; border-radius: var(--radius-sm); font-family: 'Cinzel'; font-size: 12px; letter-spacing: .03em; cursor: pointer; -webkit-appearance: none; border: 1px solid var(--gold-dim); background: var(--surface2); color: var(--gold); display: flex; align-items: center; justify-content: center; gap: 5px; }
  .pt-act:active { background: var(--border); }
  .pt-act.primary { background: var(--gold); color: #1a1000; border-color: var(--gold); }
  .pt-act.primary:active { background: #b8983e; }

  /* card action menu (long-press) */
  .pt-menu-backdrop { position: fixed; inset: 0; z-index: 130; background: rgba(0,0,0,.55); display: flex; align-items: flex-end; justify-content: center; padding: 0 0 calc(20px + var(--sab)); animation: fadeIn .15s; }
  .pt-menu { background: var(--bg2); border: 1px solid var(--border-light); border-radius: 20px; width: calc(100% - 24px); max-width: 420px; overflow: hidden; animation: sheetUp .25s cubic-bezier(.32,.72,0,1); }
  .pt-menu-card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .pt-menu-card img { width: 42px; border-radius: 6px; }
  .pt-menu-card .nm { font-family: 'Cinzel'; font-size: 14px; color: var(--text); }

  .pt-menu-opt .ic { width: 18px; text-align: center; color: var(--gold-dim); }

  /* import textarea modal reuses .modal */

  .import-status { font-size: 13px; margin-top: 4px; margin-bottom: 12px; min-height: 18px; }
  .import-status.ok { color: var(--green-ok); }
  .import-status.err { color: var(--red-bad); }
  .import-status.work { color: var(--gold); }

  .hidden { display: none !important; }
  .empty-deck-cta { text-align: center; padding: 30px 20px; color: var(--muted); font-style: italic; }

  /* ===== RESILIENCE + MOBILE POLISH ===== */
  .boot-state { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 30px; color: var(--muted); text-align: center; line-height: 1.55; font-style: italic; }
  input, textarea, .detail-scroll, .oracle-text { user-select: text; -webkit-user-select: text; }
  .search-area { position: sticky; top: 0; z-index: 20; border-bottom: 1px solid rgba(42,42,61,.72); box-shadow: 0 7px 18px rgba(10,10,15,.32); }
  .clear-icon { width: 42px; height: 42px; right: 1px; border-radius: 50%; }
  .add-btn { width: 34px; height: 34px; font-size: 20px; }
  .dl-btn { width: 32px; height: 32px; }
  .sheet-action { min-height: 36px; display: inline-flex; align-items: center; }
  .detail-card-img { max-width: min(310px, 84vw); width: 80%; }
  .card-img-wrap img, .detail-card-img, .cmdr-art, .dci-art { -webkit-user-drag: none; }
  @media (max-width: 374px) {
    .topbar { padding-left: 10px; padding-right: 10px; }

    .pt-topbar { gap: 5px; padding-left: 7px; padding-right: 7px; }

  @media (min-width: 541px) {

  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; scroll-behavior: auto !important; }
  }

  /* ================================================================
     ORACLE — iOS × MAGIC VISUAL THEME
     This layer intentionally restyles only existing elements. No app
     features, state, search behavior, deck behavior, or components are
     removed or renamed.
     ================================================================ */
  :root {
    --ios-bg: #07080d;
    --ios-panel: rgba(27, 29, 40, 0.68);
    --ios-panel-strong: rgba(35, 37, 50, 0.86);
    --ios-panel-muted: rgba(255, 255, 255, 0.045);
    --ios-hairline: rgba(255, 255, 255, 0.10);
    --ios-hairline-gold: rgba(224, 196, 106, 0.24);
    --ios-shadow: 0 16px 44px rgba(0, 0, 0, 0.28);
    --ios-shadow-deep: 0 24px 64px rgba(0, 0, 0, 0.48);

  .pt-menu { border-color: rgba(255,255,255,.13); border-radius: 24px; background: linear-gradient(180deg, rgba(40,42,55,.98), rgba(17,18,26,.99)); box-shadow: var(--ios-shadow-deep); }
  .pt-menu-opt { border-bottom-color: rgba(255,255,255,.07); font-family: var(--ios-font); font-weight: 580; }
  .toast { border-color: rgba(255,235,173,.28); border-radius: 16px; background: rgba(36,38,50,.86); color: #ffebae; font-family: var(--ios-font); font-size: 14px; font-weight: 680; box-shadow: var(--ios-shadow-deep), inset 0 1px 0 rgba(255,255,255,.08); backdrop-filter: blur(22px) saturate(145%); -webkit-backdrop-filter: blur(22px) saturate(145%); }

  /* Focus and touch accessibility. */
  button:focus-visible,
  a:focus-visible,
  input:focus-visible,
  textarea:focus-visible,
  .tab:focus-visible,
  .chip:focus-visible,
  .card-img-wrap:focus-visible,
  .dl-name:focus-visible {
    outline: 3px solid rgba(244,213,126,.78);
    outline-offset: 3px;
  }
  @media (max-width: 390px) {
    .brand { font-size: 15px; }
    .brand::after { font-size: 7px; }
    .tab { font-size: 11px; }
    .card-grid { gap: 9px; }
    .deck-action { min-width: 100%; }
  }
  @media (prefers-reduced-motion: reduce) {
    .tab, .card-tile, .add-btn, .deck-action, .chip { transition: none !important; }
  }

  /* iOS Safari viewport and keyboard hardening. */
  html { height: -webkit-fill-available; }
  body {
    min-height: 100%;
    min-height: -webkit-fill-available;
  }
  #root,
  .app {
    min-height: 100%;
    min-height: -webkit-fill-available;
  }
  @supports (height: 100dvh) {
    #root,
    .app { height: var(--oracle-vvh, 100dvh); }
  }
  @supports not (height: 100dvh) {
    #root,
    .app { height: var(--oracle-vvh, -webkit-fill-available); }
    .sheet { max-height: 88vh; }
  }
  button,
  a,
  .tab,
  .chip,
  .card-img-wrap,
  .clear-icon,
  .dl-name,
  .pt-card,
  .pt-hand-card {
    touch-action: manipulation;
  }
  .sheet,
  .detail-overlay,
  .pt-overlay,
  .modal-backdrop {
    max-height: var(--oracle-vvh, 100dvh);
  }
  @media (max-width: 390px) {
    .sheet { max-height: min(88dvh, calc(var(--oracle-vvh, 100dvh) - var(--sab))); }
  }



  /* ===== Search + printings upgrade ===== */
  .search-area { position: sticky; top: 0; z-index: 20; }
  .result-mode-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 2px 1px; }
  .ios-segment { display:flex; gap:2px; padding:3px; border:1px solid rgba(255,255,255,.10); border-radius:13px; background:rgba(255,255,255,.055); box-shadow:inset 0 1px 0 rgba(255,255,255,.04); }
  .ios-segment button { min-height:30px; border:0; border-radius:10px; padding:6px 13px; color:rgba(238,229,211,.58); background:transparent; font-family:var(--ios-font, -apple-system, BlinkMacSystemFont, sans-serif); font-size:12px; font-weight:750; -webkit-appearance:none; }
  .ios-segment button.active { color:#261b07; background:linear-gradient(180deg,#f0da89,#c7a34a); box-shadow:0 2px 7px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.52); }
  .ios-segment.compact button { min-height:29px; padding:5px 10px; font-size:11px; }
  .result-mode-note { color:rgba(238,228,210,.48); font-family:var(--ios-font, -apple-system, BlinkMacSystemFont, sans-serif); font-size:11px; font-weight:650; white-space:nowrap; }
  .card-img-loader { position:absolute; inset:0; display:block; overflow:hidden; background:#10111a; }
  .card-img-loader img { width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity .22s ease; }
  .card-img-loader img.loaded { opacity:1; }
  .card-name-stack { min-width:0; flex:1; }
  .printing-meta { overflow:hidden; color:rgba(234,220,187,.52); font-family:var(--ios-font, -apple-system, BlinkMacSystemFont, sans-serif); font-size:9px; font-weight:650; letter-spacing:.015em; text-overflow:ellipsis; white-space:nowrap; }
  .variants-btn { width:34px; height:34px; flex-shrink:0; border:1px solid rgba(255,255,255,.10); border-radius:12px; background:rgba(255,255,255,.055); color:#e6ca77; display:flex; align-items:center; justify-content:center; -webkit-appearance:none; }
  .variants-btn:active { background:rgba(224,196,106,.20); transform:scale(.94); }
  .variants-btn svg { width:16px; height:16px; }
  .view-printings-btn { width:100%; min-height:47px; margin:0 0 13px; border:1px solid rgba(224,196,106,.40); border-radius:15px; background:rgba(224,196,106,.10); color:#f2d987; display:flex; align-items:center; justify-content:center; gap:8px; font-family:var(--ios-font, -apple-system, BlinkMacSystemFont, sans-serif); font-size:13px; font-weight:760; -webkit-appearance:none; }
  .view-printings-btn:active { transform:scale(.985); background:rgba(224,196,106,.18); }
  .view-printings-btn svg { width:17px; height:17px; }
  .printings-backdrop { z-index:150; }
  .printings-sheet { z-index:155; max-height:90dvh; }
  .printings-card-head { display:flex; align-items:center; gap:11px; padding:10px 18px 13px; border-bottom:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.025); }
  .printings-card-head img { width:38px; border:1px solid rgba(255,235,173,.25); border-radius:7px; box-shadow:0 5px 13px rgba(0,0,0,.25); }
  .printings-card-title { color:#fff0c6; font-family:var(--ios-font, -apple-system, BlinkMacSystemFont, sans-serif); font-size:15px; font-weight:780; line-height:1.2; }
  .printings-card-subtitle { margin-top:2px; color:rgba(239,229,208,.51); font-family:var(--ios-font, -apple-system, BlinkMacSystemFont, sans-serif); font-size:11px; line-height:1.35; }
  .printings-sort-row { display:flex; justify-content:center; padding:10px 18px 2px; }
  .printings-body { padding-top:10px; }
  .variants-state { min-height:170px; }
  .printing-list { display:flex; flex-direction:column; gap:8px; }
  .printing-row { width:100%; min-height:72px; padding:8px; border:1px solid rgba(255,255,255,.085); border-radius:15px; background:rgba(255,255,255,.045); color:var(--text); display:grid; grid-template-columns:38px minmax(0,1fr) auto 12px; align-items:center; gap:10px; text-align:left; -webkit-appearance:none; }
  .printing-row:active { transform:scale(.99); background:rgba(224,196,106,.12); border-color:rgba(224,196,106,.30); }
  .printing-row img { width:38px; border-radius:6px; border:1px solid rgba(255,255,255,.13); }
  .printing-copy { min-width:0; display:flex; flex-direction:column; gap:1px; }
  .printing-set { overflow:hidden; color:#f6e6bd; font-family:var(--ios-font, -apple-system, BlinkMacSystemFont, sans-serif); font-size:13px; font-weight:750; text-overflow:ellipsis; white-space:nowrap; }
  .printing-meta-row, .printing-finishes { overflow:hidden; color:rgba(239,229,209,.50); font-family:var(--ios-font, -apple-system, BlinkMacSystemFont, sans-serif); font-size:10px; font-weight:600; text-overflow:ellipsis; white-space:nowrap; }
  .printing-price { color:#f2d67d; font-family:var(--ios-font, -apple-system, BlinkMacSystemFont, sans-serif); font-size:13px; font-weight:780; white-space:nowrap; }
  .printing-chevron { color:rgba(255,255,255,.36); font-family:var(--ios-font, -apple-system, BlinkMacSystemFont, sans-serif); font-size:23px; line-height:1; }
  .printing-load-more { margin-top:4px; }
  .muted-action { color:rgba(255,255,255,.34)!important; min-width:36px; text-align:right; }
  .select-stack { display:grid; grid-template-columns:1fr; gap:9px; margin-top:10px; }
  .select-stack label { color:rgba(235,224,203,.58); font-family:var(--ios-font, -apple-system, BlinkMacSystemFont, sans-serif); font-size:12px; font-weight:680; }
  .filter-select { width:100%; min-height:44px; margin-top:5px; padding:0 11px; border:1px solid rgba(255,255,255,.10); border-radius:12px; background:rgba(255,255,255,.055); color:#f3ead8; font-family:var(--ios-font, -apple-system, BlinkMacSystemFont, sans-serif); font-size:15px; -webkit-appearance:auto; }
  .match-mode-row { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:9px; }
  .match-mode-help { color:rgba(238,228,210,.48); font-family:var(--ios-font, -apple-system, BlinkMacSystemFont, sans-serif); font-size:11px; font-weight:650; line-height:1.25; }
  .match-mode-row .ios-segment { flex-shrink:0; }
  @media (max-width:390px) { .result-mode-note{display:none;} .ios-segment button{padding:6px 11px;} .printing-row{grid-template-columns:36px minmax(0,1fr) auto 10px;gap:8px;} .printing-row img{width:36px;} .match-mode-help{font-size:10px;} }
