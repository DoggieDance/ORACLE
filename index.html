<style>
  /* ============================================================
     ORACLE v3 — one consolidated design layer.
     Identity: iOS material chrome × gold arcana. Cinzel wordmark,
     Crimson Pro for card text, system font for UI, gold-leaf
     primaries, deep ink surfaces, the 8-bit spark for upgrades.
     ============================================================ */
  :root {
    --bg: #0a0b12; --bg2: #0d0e16; --ink: #07080d;
    --hair: rgba(255,255,255,.085); --hair2: rgba(255,255,255,.13);
    --glass: rgba(255,255,255,.05); --glass2: rgba(255,255,255,.075);
    --surface: #14151f; --surface2: #1a1b28;
    --gold: #d9b755; --gold-hi: #f0da89; --gold-lo: #c6a144;
    --gold-bright: #f0d580; --gold-dim: rgba(232,205,120,.72); --gold-glow: rgba(224,196,106,.16);
    --gold-ink: #241a05;
    --text: #f3ead8; --text-dim: rgba(238,229,211,.66); --muted: rgba(235,225,207,.5); --muted2: rgba(235,225,207,.34);
    --white: #fdf8ec;
    --w: #f4e9c1; --u: #4b8fd6; --b: #9a7fb0; --r: #d8523f; --g: #4fa86e; --c: #b0a99a;
    --green-ok: #58b87e; --red-bad: #e0604c; --blue-info: #6fb0e6; --purple-syn: #a794e0;
    --radius: 16px; --radius-sm: 12px; --card-radius: 14px;
    --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px);
    --sab-live: var(--sab);
    --vvh: 100dvh; --vvt: 0px;
    --ios-font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
    --serif: 'Crimson Pro', Georgia, serif;
    --display: 'Cinzel', 'Times New Roman', serif;
    --grad-gold: linear-gradient(180deg, #f0da89, #c6a144);
    --shadow-deep: 0 18px 50px rgba(0,0,0,.5);
  }
  html.kb-open { --sab-live: 0px; }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { position: fixed; inset: 0; width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; background: var(--bg); color: var(--text); font-family: var(--ios-font); font-size: 16px; -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%; }
  body { user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
  img { -webkit-user-drag: none; }
  button, a, .tab, .chip, .card-img-wrap, .clear-icon, .dl-name, .pt-card, .pt-hand-card, .ac-item, .sort-opt, .opt-pill, .color-btn, .mode-pill, .deck-card-item, .toggle-row { touch-action: manipulation; }

  input, select, textarea { font-size: 16px; }
  #root { height: 100%; }
  .boot-state { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 30px; color: var(--muted); text-align: center; line-height: 1.55; font-family: var(--serif); font-style: italic; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 70% 35% at 50% -5%, rgba(224,196,106,.08), transparent 65%), radial-gradient(ellipse 90% 50% at 12% 110%, rgba(75,143,214,.05), transparent 55%), radial-gradient(ellipse 80% 50% at 90% 105%, rgba(216,82,63,.04), transparent 55%); pointer-events: none; z-index: 0; }

  .app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; height: var(--vvh, 100dvh); max-width: 540px; margin: 0 auto; width: 100%; }

  /* ===== Top chrome ===== */
  .topbar { padding: calc(var(--sat) + 12px) 14px 10px; flex-shrink: 0; background: linear-gradient(180deg, rgba(22,23,32,.86), rgba(13,14,20,.7)); border-bottom: 1px solid var(--hair); box-shadow: 0 8px 24px rgba(0,0,0,.12); backdrop-filter: saturate(150%) blur(26px); -webkit-backdrop-filter: saturate(150%) blur(26px); }

  .brand::after { content: "COMMANDER DECK BUILDER"; display: block; margin-top: 5px; color: rgba(239,229,204,.46); font-family: var(--ios-font); font-size: 8px; font-weight: 700; letter-spacing: .23em; text-shadow: none; }
  @keyframes brandGlow { 0%,100% { text-shadow: 0 1px 0 rgba(255,255,255,.08), 0 0 16px rgba(224,196,106,.18); } 50% { text-shadow: 0 1px 0 rgba(255,255,255,.1), 0 0 28px rgba(224,196,106,.42); } }
  .tabs { display: flex; gap: 2px; padding: 3px; border: 1px solid var(--hair); border-radius: 14px; background: var(--glass); box-shadow: inset 0 1px 0 rgba(255,255,255,.05); }
  .tab { flex: 1; min-height: 35px; display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; padding: 7px 6px; color: rgba(233,226,207,.54); font-family: var(--ios-font); font-size: 12px; font-weight: 650; cursor: pointer; transition: background .18s ease, color .18s ease, transform .12s ease; }
  .tab.active { color: #f9edd0; background: linear-gradient(180deg, rgba(224,196,106,.22), rgba(224,196,106,.13)); box-shadow: inset 0 1px 0 rgba(255,243,198,.23), 0 1px 3px rgba(0,0,0,.23); }
  .tab:active { transform: scale(.975); }
  .tab .badge { min-width: 18px; height: 18px; line-height: 16px; padding: 0 5px; margin-left: 5px; border: 1px solid var(--hair); border-radius: 9px; background: rgba(0,0,0,.22); color: rgba(244,233,193,.7); font-size: 10px; font-weight: 700; }
  .tab.active .badge { border-color: rgba(224,196,106,.3); background: rgba(201,168,76,.22); color: #ffedaf; }

  .screen { flex: 1; min-height: 0; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
  .screen::-webkit-scrollbar { display: none; }

  /* ===== Search area ===== */
  .search-area { position: sticky; top: 0; z-index: 20; padding: 12px 14px 10px; background: linear-gradient(180deg, rgba(15,16,23,.9), rgba(10,11,16,.72)); border-bottom: 1px solid rgba(255,255,255,.055); box-shadow: 0 10px 25px rgba(0,0,0,.13); backdrop-filter: saturate(150%) blur(22px); -webkit-backdrop-filter: saturate(150%) blur(22px); }
  .search-row { display: flex; gap: 8px; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 0; }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; color: var(--gold-dim); pointer-events: none; }
  .clear-icon { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); width: 28px; height: 28px; color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .clear-icon svg { width: 18px; height: 18px; }
  input.search-input { width: 100%; background: var(--glass2); border: 1px solid var(--hair); border-radius: 15px; padding: 12px 38px 12px 38px; font-family: var(--ios-font); font-size: 16px; color: var(--text); outline: none; transition: border-color .2s, box-shadow .2s; -webkit-appearance: none; }

  input.search-input::placeholder { color: var(--muted2); }
  .icon-btn { background: var(--glass2); border: 1px solid var(--hair); color: var(--gold-bright); border-radius: 15px; width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background .15s, transform .1s; position: relative; }
  .icon-btn:active { transform: scale(.94); background: rgba(224,196,106,.18); }
  .icon-btn svg { width: 21px; height: 21px; }
  .icon-btn.active { background: var(--gold-glow); border-color: rgba(224,196,106,.45); color: var(--gold-bright); }
  .filter-badge { position: absolute; top: -5px; right: -5px; background: var(--grad-gold); color: var(--gold-ink); font-size: 10px; font-weight: 800; min-width: 17px; height: 17px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 4px; box-shadow: 0 2px 6px rgba(0,0,0,.4); }

  .autocomplete { position: absolute; left: 14px; right: 14px; top: calc(100% - 4px); background: rgba(28,29,41,.97); border: 1px solid var(--hair2); border-radius: 14px; box-shadow: var(--shadow-deep); z-index: 50; max-height: 260px; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  .ac-item { padding: 12px 16px; font-size: 15px; font-weight: 550; color: var(--text); cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.06); display: flex; align-items: center; gap: 9px; }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:active { background: var(--gold-glow); }
  .ac-item svg { width: 13px; height: 13px; color: var(--gold-dim); flex-shrink: 0; }

  .chip-row { display: flex; gap: 7px; overflow-x: auto; padding: 9px 0 2px; scrollbar-width: none; }
  .chip-row::-webkit-scrollbar { display: none; }
  /* Edge-fade scroll affordance: JS sets data-ef to fade the edge(s) with hidden chips. */
  .chip-row[data-ef="s"] { -webkit-mask-image: linear-gradient(90deg, #000 calc(100% - 26px), transparent); mask-image: linear-gradient(90deg, #000 calc(100% - 26px), transparent); }
  .chip-row[data-ef="e"] { -webkit-mask-image: linear-gradient(90deg, transparent, #000 26px); mask-image: linear-gradient(90deg, transparent, #000 26px); }
  .chip-row[data-ef="m"] { -webkit-mask-image: linear-gradient(90deg, transparent, #000 26px, #000 calc(100% - 26px), transparent); mask-image: linear-gradient(90deg, transparent, #000 26px, #000 calc(100% - 26px), transparent); }
  .chip { background: var(--glass2); border: 1px solid var(--hair); border-radius: 20px; padding: 7px 14px; font-size: 12.5px; font-weight: 620; color: var(--text-dim); cursor: pointer; white-space: nowrap; transition: all .15s; font-family: var(--ios-font); }
  .chip.active { background: var(--gold-glow); border-color: rgba(224,196,106,.45); color: var(--gold-bright); }
  .chip:active { transform: scale(.95); }

  .result-mode-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 2px 1px; }
  .ios-segment { display: flex; gap: 2px; padding: 3px; border: 1px solid rgba(255,255,255,.1); border-radius: 13px; background: rgba(255,255,255,.055); box-shadow: inset 0 1px 0 rgba(255,255,255,.04); }
  .ios-segment button { min-height: 30px; border-radius: 10px; padding: 6px 13px; color: rgba(238,229,211,.58); font-family: var(--ios-font); font-size: 12px; font-weight: 750; }
  .ios-segment button.active { color: #261b07; background: var(--grad-gold); box-shadow: 0 2px 7px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.52); }
  .ios-segment.compact button { min-height: 29px; padding: 5px 10px; font-size: 11px; }
  .ios-segment.stretch { width: 100%; }
  .ios-segment.stretch button { flex: 1; }
  .result-mode-note { color: rgba(238,228,210,.48); font-size: 11px; font-weight: 650; white-space: nowrap; }

  /* ===== Results grid ===== */
  .results-pad { padding: 8px 12px calc(20px + var(--sab-live)); }
  .results-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 4px 12px; gap: 10px; }
  .results-meta { font-size: 13px; color: var(--muted); font-style: italic; font-family: var(--serif); flex: 1; }
  .sort-btn { background: var(--glass2); border: 1px solid var(--hair); border-radius: 11px; padding: 7px 11px; font-size: 12px; font-weight: 700; color: var(--gold-bright); cursor: pointer; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .sort-btn:active { background: rgba(224,196,106,.15); }
  .sort-btn svg { width: 13px; height: 13px; }

  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card-tile { background: var(--surface); border: 1px solid var(--hair); border-radius: var(--card-radius); overflow: hidden; position: relative; transition: transform .3s var(--spring), box-shadow .3s ease, border-color .2s ease; }
  .card-tile:active { transform: scale(.97); }
  .card-tile.in-deck { border-color: rgba(224,196,106,.55); box-shadow: 0 0 0 1px rgba(224,196,106,.4); }
  .card-img-wrap { width: 100%; aspect-ratio: 488/680; background: #10111a; overflow: hidden; position: relative; cursor: pointer; }
  .card-img-loader { position: absolute; inset: 0; display: block; overflow: hidden; background: #10111a; }
  .card-img-loader img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity .22s ease; }
  .card-img-loader img.loaded { opacity: 1; }
  .img-skeleton { position: absolute; inset: 0; background: linear-gradient(100deg, #14151f 30%, #1d1e2c 50%, #14151f 70%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .card-img-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 14px; text-align: center; height: 100%; }
  .card-img-placeholder .pn { font-family: var(--display); font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .card-img-placeholder .pt { font-size: 11px; color: var(--muted); font-style: italic; font-family: var(--serif); }

  .card-footer { padding: 6px 8px; border-top: 1px solid rgba(255,255,255,.065); display: flex; align-items: center; gap: 6px; }
  .card-name-stack { min-width: 0; flex: 1; }
  .card-name-small { font-size: 11px; font-weight: 720; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .printing-meta { overflow: hidden; color: rgba(234,220,187,.52); font-size: 9px; font-weight: 650; letter-spacing: .015em; text-overflow: ellipsis; white-space: nowrap; }
  .variants-btn { width: 34px; height: 34px; flex-shrink: 0; border: 1px solid rgba(255,255,255,.1); border-radius: 12px; background: rgba(255,255,255,.055); color: #e6ca77; display: flex; align-items: center; justify-content: center; }
  .variants-btn:active { background: rgba(224,196,106,.2); transform: scale(.94); }
  .variants-btn svg { width: 16px; height: 16px; }
  .add-btn { width: 34px; height: 34px; border-radius: 12px; background: rgba(224,196,106,.16); border: 1px solid rgba(224,196,106,.4); color: var(--gold-bright); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; cursor: pointer; flex-shrink: 0; line-height: 1; padding-bottom: 2px; }
  .add-btn:active { transform: scale(.9); background: var(--grad-gold); color: var(--gold-ink); }
  .add-btn.added { background: rgba(255,255,255,.06); border-color: var(--hair2); color: var(--gold-bright); }
  .tile-foot { position: absolute; left: 6px; bottom: 6px; z-index: 2; display: flex; align-items: center; gap: 5px; max-width: calc(100% - 12px); pointer-events: none; }
  .qty-pill { position: static; background: rgba(10,11,17,.85); border: 1px solid rgba(224,196,106,.55); color: var(--gold-bright); font-size: 11px; font-weight: 750; min-width: 22px; height: 22px; border-radius: 11px; display: flex; align-items: center; justify-content: center; padding: 0 6px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); flex: 0 0 auto; }
  .cmdr-flag { position: absolute; top: 6px; left: 6px; background: rgba(224,196,106,.94); color: var(--gold-ink); font-size: 9px; font-weight: 800; letter-spacing: .05em; padding: 3px 7px; border-radius: 7px; }
  .price-chip { position: static; padding: 2px 7px; border-radius: 8px; font-size: 10px; font-weight: 750; color: #ffe9ad; background: rgba(10,11,17,.78); border: 1px solid rgba(255,238,183,.3); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); flex: 0 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .pip { width: 15px; height: 15px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 750; font-family: var(--ios-font); color: #1a1408; flex-shrink: 0; box-shadow: inset 0 -1px 2px rgba(0,0,0,.25); }
  .pip.W { background: var(--w); } .pip.U { background: var(--u); color: #fff; } .pip.B { background: var(--b); color: #fff; } .pip.R { background: var(--r); color: #fff; } .pip.G { background: var(--g); color: #fff; } .pip.C { background: var(--c); }
  .pip.generic { background: #4a4a5c; color: var(--text); } .pip.X { background: #4a4a5c; color: var(--text); } .pip.hybrid { background: linear-gradient(135deg, var(--gold) 50%, var(--u) 50%); color: #fff; }

  .state-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 30px; text-align: center; gap: 14px; color: var(--muted); font-style: italic; font-family: var(--serif); font-size: 15px; line-height: 1.5; }
  .state-msg .symbol { font-size: 40px; opacity: .35; }
  .state-msg em { color: var(--gold-dim); }
  .spinner { width: 30px; height: 30px; border: 2px solid var(--hair2); border-top-color: var(--gold-bright); border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-more-btn { display: block; width: 100%; min-height: 47px; margin-top: 14px; background: var(--glass2); border: 1px solid var(--hair); border-radius: 15px; padding: 13px; color: var(--gold-dim); font-size: 13px; font-weight: 720; text-align: center; }
  .load-more-btn:active { background: rgba(224,196,106,.14); color: var(--gold-bright); }
  .scroll-sentinel { height: 2px; }

  /* ===== Sheets (host tracks the VISUAL viewport → keyboard-safe) ===== */
  .sheet-host { position: fixed; left: 0; right: 0; top: var(--vvt, 0px); height: var(--vvh, 100dvh); z-index: 150; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; }
  .sheet-host.z-print { z-index: 170; }
  .sheet-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); animation: fadeIn .18s; }
  .sheet { position: relative; z-index: 2; width: 100%; max-width: 540px; background: linear-gradient(180deg, #191a26, #101119); border-top-left-radius: 24px; border-top-right-radius: 24px; border-top: 1px solid var(--hair2); box-shadow: 0 -8px 40px rgba(0,0,0,.5); max-height: calc(100% - var(--sat) - 10px); display: flex; flex-direction: column; overflow: hidden; animation: sheetUp .32s cubic-bezier(.32,.72,0,1); }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle { width: 38px; height: 5px; background: var(--hair2); border-radius: 3px; margin: 10px auto 4px; flex-shrink: 0; }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px 12px; border-bottom: 1px solid var(--hair); flex-shrink: 0; }
  .sheet-title { font-family: var(--display); font-size: 16px; font-weight: 600; color: var(--gold-bright); letter-spacing: .05em; }
  .sheet-action { font-size: 15px; font-weight: 700; color: var(--gold-bright); cursor: pointer; padding: 6px; min-height: 36px; display: inline-flex; align-items: center; }
  .sheet-action.reset { color: var(--muted); }
  .muted-action { color: rgba(255,255,255,.34) !important; min-width: 36px; text-align: right; }
  .sheet-body { flex: 1 1 auto; min-height: 0; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; padding: 16px 18px calc(20px + var(--sab-live)); }
  .sheet-body::-webkit-scrollbar { display: none; }

  .sort-opt { display: flex; align-items: center; justify-content: space-between; min-height: 50px; padding: 13px 6px; font-size: 15.5px; font-weight: 580; color: var(--text); border-bottom: 1px solid rgba(255,255,255,.06); cursor: pointer; }
  .sort-opt:last-child { border-bottom: none; }
  .sort-opt:active { background: var(--gold-glow); }
  .sort-opt .check { opacity: 0; color: var(--gold-bright); font-weight: 800; }
  .sort-opt.sel { color: var(--gold-bright); }
  .sort-opt.sel .check { opacity: 1; }

  /* ===== Filter sheet ===== */
  .fgroup { margin-bottom: 22px; }
  .fgroup-label { font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: rgba(232,205,120,.72); margin-bottom: 11px; }
  .fgroup-label .hint { font-weight: 560; letter-spacing: 0; text-transform: none; color: var(--muted2); margin-left: 6px; font-size: 11px; }
  .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 11px; }
  .color-btn { aspect-ratio: 1; border: 1px solid var(--hair); border-radius: 14px; background: var(--glass); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform .12s, background .15s, border-color .15s; }
  .color-btn:active { transform: scale(.92); }
  .color-btn .cpip { font-size: 19px; filter: grayscale(.6) opacity(.6); transition: filter .15s; }

  .art-upgrade-badge { position: absolute; bottom: 6px; right: 6px; z-index: 3; width: 26px; height: 26px; padding: 0; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,238,183,.55); border-radius: 8px; background: radial-gradient(120% 120% at 30% 22%, rgba(126,204,255,.96), rgba(70,132,212,.94)); color: #fff6d8; box-shadow: 0 3px 10px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.5); animation: badgePop .26s cubic-bezier(.3,1.45,.5,1) both; }

  /* ===== Workshop (synergy v3) ===== */

  .syn-count { display: inline-flex; align-items: center; margin-left: 7px; padding: 1px 7px; border: 1px solid rgba(224,196,106,.35); border-radius: 8px; background: rgba(224,196,106,.1); color: #f0d580; font-size: 10px; font-weight: 800; vertical-align: 2px; }
  .synergy-rail { display: grid; grid-auto-flow: column; grid-auto-columns: 118px; gap: 10px; overflow-x: auto; padding: 2px 2px 8px; scrollbar-width: none; scroll-snap-type: x proximity; }
  .synergy-rail::-webkit-scrollbar { display: none; }
  /* Scroll-cue edge fade — hints the rail keeps going; data-ef set by JS only while it overflows (mobile). Horizontal-only mask, so it never clips card footers. */
  .synergy-rail[data-ef="s"] { -webkit-mask-image: linear-gradient(90deg, #000 0, #000 calc(100% - 26px), transparent 100%); mask-image: linear-gradient(90deg, #000 0, #000 calc(100% - 26px), transparent 100%); }
  .synergy-rail[data-ef="m"] { -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 26px, #000 calc(100% - 26px), transparent 100%); mask-image: linear-gradient(90deg, transparent 0, #000 26px, #000 calc(100% - 26px), transparent 100%); }
  .synergy-rail[data-ef="e"] { -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 26px, #000 100%); mask-image: linear-gradient(90deg, transparent 0, #000 26px, #000 100%); }
  .syn-card { scroll-snap-align: start; position: relative; border: 1px solid rgba(255,255,255,.1); border-radius: 14px; overflow: hidden; background: linear-gradient(155deg, rgba(43,45,59,.94), rgba(22,23,32,.98)); }

  .syn-rail-msg .spinner { width: 19px; height: 19px; }

  /* Role chips, traps, verified (engine v3) */

  /* ===== Similar commanders ===== */
  .trait-chip { display: inline-flex; align-items: center; padding: 4px 10px; border: 1px solid rgba(224,196,106,.4); border-radius: 20px; background: rgba(224,196,106,.1); color: #f0d580; font-size: 11px; font-weight: 720; white-space: nowrap; }

  /* ===== Random commander ===== */
  .rnd-body { flex: 1; min-height: 0; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; padding: 20px 18px calc(30px + var(--sab-live)); position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }

  /* ===== Basic lands sheet ===== */
  .bl-hint { padding: 10px 18px 2px; font-size: 12px; color: var(--muted); font-family: var(--serif); font-style: italic; text-align: center; }

  /* ===== Toast, modals ===== */
  .toast { position: fixed; left: 50%; bottom: calc(28px + var(--sab-live)); transform: translateX(-50%); border: 1px solid rgba(255,235,173,.28); border-radius: 16px; background: rgba(36,38,50,.86); color: #ffebae; padding: 11px 20px; font-size: 14px; font-weight: 680; z-index: 300; box-shadow: var(--shadow-deep), inset 0 1px 0 rgba(255,255,255,.08); animation: toastIn .3s; max-width: 90%; text-align: center; backdrop-filter: blur(22px) saturate(145%); -webkit-backdrop-filter: blur(22px) saturate(145%); }

  .toast.has-action { display: flex; align-items: center; gap: 12px; padding: 8px 8px 8px 20px; text-align: left; }
  .toast.has-action .toast-msg { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .toast-action { flex: none; border: 1px solid rgba(255,235,173,.34); border-radius: 11px; background: rgba(255,235,173,.10); color: #ffe9a8; font: inherit; font-weight: 800; letter-spacing: .04em; padding: 7px 14px; min-height: 34px; cursor: pointer; transition: background .15s, border-color .15s; }

  /* ============ v4.0 LIQUID PASS ============ */
  :root { --spring: cubic-bezier(.34,1.45,.44,1); --fluid: cubic-bezier(.22,1,.36,1); --card-radius: 12px; }

  /* Brand: no ambient loop; breathe once, then stillness. Collapses when content scrolls. */
  .brand { animation: none; text-shadow: 0 1px 0 rgba(255,255,255,.08), 0 0 18px rgba(224,196,106,.2); transition: font-size .38s var(--fluid), letter-spacing .38s var(--fluid), margin .32s var(--fluid); }
  .brand::after { max-height: 14px; transition: max-height .3s var(--fluid), opacity .22s ease, margin .3s var(--fluid); }
  html.scrolled .brand { font-size: 13.5px; letter-spacing: .3em; margin-bottom: 9px; }
  html.scrolled .brand::after { max-height: 0; opacity: 0; margin-top: 0; overflow: hidden; }
  html.scrolled .topbar { box-shadow: 0 12px 32px rgba(0,0,0,.28); }
  .topbar { transition: box-shadow .3s ease; }

  /* Gold scarcity: gold belongs to the commander and to touch. Structure goes quiet. */
  .sheet-title { color: var(--text); }
  .cmdr-label { color: var(--muted); letter-spacing: .16em; }
  .synergy-section-title { color: var(--text); }
  .cov-title span:first-child { color: var(--text); }
  .stat-title { color: var(--text); }

  /* Liquid tabs */
  .tabs { border-radius: 16px; background: rgba(255,255,255,.045); box-shadow: inset 0 1px 0 rgba(255,255,255,.07), inset 0 -1px 0 rgba(0,0,0,.25); }
  .tab { border-radius: 12px; transition: background .32s var(--fluid), color .25s ease, transform .28s var(--spring); }
  .tab:active { transform: scale(.94); }
  .tab.on { box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 3px 12px rgba(0,0,0,.28); }

  /* Liquid glass sheets & overlays */
  .sheet { background: linear-gradient(180deg, rgba(30,31,44,.88), rgba(15,16,24,.92)); backdrop-filter: blur(42px) saturate(170%); -webkit-backdrop-filter: blur(42px) saturate(170%); box-shadow: inset 0 1px 0 rgba(255,255,255,.13), 0 -14px 50px rgba(0,0,0,.55); animation: sheetUp .52s var(--spring); border-top-left-radius: 26px; border-top-right-radius: 26px; }
  .sheet-backdrop { backdrop-filter: blur(8px) saturate(120%); -webkit-backdrop-filter: blur(8px) saturate(120%); }
  .sheet-handle { transition: width .3s var(--spring); }
  .sheet:active .sheet-handle { width: 48px; }

  /* Squish: every touchable breathes on press */
  .chip:active, .deck-action:active, .syn-add:active, .sheet-action:active, .back-btn:active, .opt-pill:active, .mode-pill:active, .color-btn:active { transform: scale(.95); }
  .chip, .deck-action, .syn-add, .sheet-action, .back-btn, .opt-pill, .mode-pill, .color-btn { transition: transform .3s var(--spring), background .2s ease, color .2s ease, border-color .2s ease; }
  .syn-card { transition: transform .3s var(--spring); }
  .syn-card:active { transform: scale(.97); }

  /* Elevation discipline: one step per level */
  .synergy-section, .cov-card, .trap-card, .stat-card { box-shadow: none; }

  /* ---- The Altar: commander hero ---- */
  .synergy-head-card.altar { position: relative; display: block; height: 208px; padding: 0; overflow: hidden; border-radius: 20px; border: 1px solid var(--hair2); background: var(--ink); box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 16px 40px rgba(0,0,0,.4); }
  .synergy-head-card.altar > img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 22%; opacity: .92; -webkit-mask-image: linear-gradient(180deg, #000 42%, rgba(0,0,0,.35) 78%, transparent 100%); mask-image: linear-gradient(180deg, #000 42%, rgba(0,0,0,.35) 78%, transparent 100%); }
  .synergy-head-card.altar::before { content: ''; position: absolute; inset: 0; background: var(--tint, none); mix-blend-mode: screen; pointer-events: none; }

  .foil-once::after { content: ''; position: absolute; inset: -40%; background: linear-gradient(115deg, transparent 42%, rgba(255,244,214,.16) 50%, rgba(255,255,255,.05) 54%, transparent 62%); transform: translateX(-120%) rotate(0.001deg); animation: foilSweep 1.4s var(--fluid) .35s 1 forwards; pointer-events: none; }

  .cov-bar { position: relative; height: 7px; border-radius: 4px; background: rgba(0,0,0,.4); box-shadow: inset 0 1px 2px rgba(0,0,0,.55), inset 0 -1px 0 rgba(255,255,255,.05); overflow: visible; }

  .rail-in { animation: railIn .55s var(--fluid) both; }
  @keyframes railIn { from { opacity: 0; transform: translateY(14px) scale(.985); } to { opacity: 1; transform: none; } }
  .synergy-head-card.altar { animation: altarIn .7s var(--fluid) both; }
  @keyframes altarIn { from { opacity: 0; transform: scale(.97); } to { opacity: 1; transform: none; } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001s !important; animation-delay: 0s !important; transition-duration: .001s !important; }
  }

    /* Shell: sidebar + content */
    .app { max-width: 1560px; display: grid; grid-template-columns: 252px minmax(0, 1fr); grid-template-rows: 100%; border-left: 1px solid var(--hair); border-right: 1px solid var(--hair); }

    /* Desktop scrollbars: thin, quiet */
    .screen::-webkit-scrollbar, .synergy-scroll::-webkit-scrollbar, .sheet-body::-webkit-scrollbar { display: block; width: 9px; }
    .screen::-webkit-scrollbar-thumb, .synergy-scroll::-webkit-scrollbar-thumb, .sheet-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 5px; border: 2px solid transparent; background-clip: content-box; }
    .screen::-webkit-scrollbar-track, .synergy-scroll::-webkit-scrollbar-track, .sheet-body::-webkit-scrollbar-track { background: transparent; }
  }

  @keyframes panelIn { from { opacity: 0; transform: translateX(-50%) translateY(14px) scale(.98); } to { opacity: 1; transform: translateX(-50%); } }
  @keyframes dialogIn { from { opacity: 0; transform: translateY(16px) scale(.96); } to { opacity: 1; transform: none; } }

  /* Hover physics (any device with a real pointer) */
  @media (hover: hover) and (pointer: fine) {
    .syn-card:hover { transform: translateY(-4px); box-shadow: 0 14px 30px rgba(0,0,0,.45); border-color: rgba(255,255,255,.18); }
    .tab:hover:not(.on) { background: rgba(255,255,255,.06); color: var(--text); }
    .chip:hover { background: rgba(255,255,255,.08); color: var(--text); }
    .deck-action:hover, .syn-add:hover { border-color: rgba(224,196,106,.45); color: var(--gold-bright); }
    .sheet-action:hover, .back-btn:hover { color: var(--gold-hi); }
    .card-img-wrap:hover img { transform: scale(1.025); }
    .card-img-wrap img { transition: transform .35s var(--fluid); }
    .card-tile:hover { transform: translateY(-4px); box-shadow: 0 16px 32px rgba(0,0,0,.5); border-color: rgba(224,196,106,.42); }
    .card-tile.in-deck:hover { box-shadow: 0 16px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(224,196,106,.45); border-color: rgba(224,196,106,.6); }
    .sim-card:hover { transform: translateY(-4px); box-shadow: 0 16px 32px rgba(0,0,0,.5); border-color: rgba(224,196,106,.42); }
    .sim-card:hover .sim-img img { transform: scale(1.03); }
    .cmdr-art:hover { box-shadow: 0 6px 18px rgba(0,0,0,.5), 0 0 0 1px rgba(224,196,106,.5); cursor: pointer; }
    .deck-card-item:hover { border-color: rgba(224,196,106,.4); box-shadow: 0 12px 30px rgba(0,0,0,.45); }
    .deck-card-item:hover .dci-bg { transform: scale(1.045); }
    .dci-del:hover { color: var(--red-bad); border-color: rgba(216,82,63,.5); }
  }


  /* ============ v4.3: rail windows + view-all + desktop readability ============ */
  .view-all { margin-left: auto; flex-shrink: 0; background: none; border: none; font-family: var(--ios-font); font-size: 12.5px; font-weight: 700; color: var(--gold-dim); cursor: pointer; padding: 4px 2px 4px 10px; min-height: 30px; transition: color .2s ease, transform .3s var(--spring); }
  .view-all:active { transform: scale(.94); }
  .synergy-section-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  @media (hover: hover) and (pointer: fine) { .view-all:hover { color: var(--gold-bright); } }
  @media (min-width: 900px) {
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(216px, 1fr)); gap: 16px; }
    .synergy-rail { grid-template-columns: repeat(auto-fill, minmax(188px, 1fr)); gap: 13px; }
    .syn-name { font-size: 13.5px; }
    .syn-foot { padding: 9px 10px; }
    .syn-price { font-size: 12px; padding: 3px 8px; }
    .card-name-row, .result-name { font-size: 14px; }
  }


  /* ============ v4.4 DESKTOP REFINEMENT: use the monitor ============ */
  @media (min-width: 900px) {
    /* Wider shell: QHD shouldn't be half dead space */
    .app { max-width: 1920px; grid-template-columns: 264px minmax(0, 1fr); }
    .results-pad, .deck-screen, .decks-screen { max-width: 1460px; }

    /* Deck actions: one flowing row, no orphan Moxfield */
    .deck-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(172px, 1fr)); gap: 10px; }
    .deck-action { min-width: 0; }

    /* Deck list: two-column groups, headers span both */
    .deck-screen > div:has(> .deck-section-head) { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; align-items: start; }
    .deck-screen > div:has(> .deck-section-head) > .deck-section-head { grid-column: 1 / -1; }

    /* My Decks: art-tile grid instead of a stretched stack */
    .deck-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .deck-card-item { min-height: 152px; }

    /* Workshop panel earns the width too */
    .detail-overlay { width: min(1340px, calc(100% - 96px)); }
    .synergy-rail { grid-template-columns: repeat(auto-fill, minmax(196px, 1fr)); }
  }


  /* ============ v4.5 DESKTOP FULL-BLEED ============ */
  @media (min-width: 900px) {
    /* No shell cap: sidebar hugs the window edge, content owns the rest */
    .app { max-width: none; border-left: none; border-right: none; }

    /* Content fills, with breathing room instead of caps */
    .results-pad, .deck-screen, .decks-screen { max-width: none; padding: 26px 44px 70px; }

    /* Deck groups scale: 2 columns at laptop width, 3-4 on a big monitor */
    .deck-screen > div:has(> .deck-section-head) { grid-template-columns: repeat(auto-fill, minmax(520px, 1fr)); }

    /* Keep the top-of-deck controls from stretching absurdly wide */
    .cmdr-banner, .deck-actions, .deck-count-hero, .mode-toggle, .synergy-toggle-row { max-width: 1560px; margin-left: auto; margin-right: auto; }
    .deck-actions { grid-template-columns: repeat(auto-fit, minmax(172px, 1fr)); }
    .cmdr-banner { margin-bottom: 14px; }

    /* Workshop panel scales with the window */
    .detail-overlay { width: min(1680px, calc(100% - 120px)); }
  }


  /* ============ v4.6: desktop search-header polish ============ */
  @media (min-width: 900px) {
    /* Search header: one coherent glass band instead of scattered rows */
    .search-area { position: sticky; top: 0; z-index: 40; background: linear-gradient(180deg, rgba(12,13,20,.94), rgba(12,13,20,.86)); backdrop-filter: blur(24px) saturate(150%); -webkit-backdrop-filter: blur(24px) saturate(150%); border-bottom: 1px solid var(--hair); padding: 14px 44px 4px; margin: 0; }
    .search-row { max-width: 1040px; }
    .search-input { font-size: 14.5px; }
    .chip-row { padding: 8px 0 4px; }
    .result-mode-row { padding: 2px 0 10px; display: flex; align-items: center; gap: 10px; }
    .results-pad { padding-top: 18px; }
    .results-bar { padding: 2px 4px 16px; align-items: baseline; }
    .results-meta { font-size: 13.5px; }
  }


  /* ============ v4.11: Game Plans ============ */
  .plan-card { border: 1px solid var(--hair2); border-radius: 16px; background: linear-gradient(160deg, rgba(38,36,52,.5), rgba(18,17,27,.7)); padding: 13px 14px; margin-bottom: 14px; }
  .plan-title { font-size: 11px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 9px; }
  .plan-row { display: flex; align-items: baseline; gap: 10px; padding: 5px 0; }
  .plan-name { flex-shrink: 0; font-weight: 760; font-size: 13.5px; color: var(--gold-bright); min-width: 118px; }
  .plan-win { font-family: var(--serif); font-style: italic; font-size: 12.5px; color: rgba(234,225,207,.62); line-height: 1.35; }
  .blend-list { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--hair); }
  .blend-row { display: flex; align-items: baseline; gap: 9px; padding: 4px 0; }
  .blend-chip { flex-shrink: 0; width: 26px; text-align: center; font-size: 12px; font-weight: 800; border-radius: 8px; padding: 1px 0; }
  .blend-chip.great { color: #6fdca0; background: rgba(88,184,126,.14); }
  .blend-chip.good { color: #9fd58a; background: rgba(140,190,110,.12); }
  .blend-chip.ok { color: var(--muted); background: rgba(255,255,255,.06); }
  .blend-chip.warn { color: #ecc46a; background: rgba(224,180,90,.13); }
  .blend-chip.bad { color: #e77; background: rgba(220,90,90,.13); }
  .blend-names { flex-shrink: 0; font-size: 12.5px; font-weight: 680; color: var(--text); }
  .blend-why { font-size: 12px; color: var(--muted); line-height: 1.35; }
  .plan-note { margin-top: 9px; font-family: var(--serif); font-style: italic; font-size: 12px; color: rgba(232,205,120,.66); }
  @media (max-width: 899px) { .plan-row, .blend-row { flex-wrap: wrap; } .plan-name { min-width: 0; } }


  /* v4.13: honesty note */
  .novel-note { border: 1px solid rgba(236,196,106,.3); background: rgba(224,180,90,.07); border-radius: 14px; padding: 11px 14px; margin-bottom: 14px; font-family: var(--serif); font-style: italic; font-size: 13px; line-height: 1.45; color: rgba(236,208,140,.85); }


  /* ============ v4.16: card text reads like a card ============ */
  /* Real MTG frames set rules text upright; only reminder/flavor is italic.
     Symbols render as inline pips instead of raw {T}/{2}{G} braces. */
  .oracle-text { font-style: normal; white-space: normal; font-size: 16.5px; }
  .oracle-text p { margin: 0 0 9px; }
  .oracle-text p:last-child { margin-bottom: 0; }
  .oracle-text .rem { font-style: italic; color: rgba(238,229,211,.6); }
  .oracle-text .pip { width: 17px; height: 17px; font-size: 10px; font-weight: 800; vertical-align: -3px; margin: 0 1px; box-shadow: -1px 1px 0 rgba(0,0,0,.55), inset 0 -1px 2px rgba(0,0,0,.25); }
  .pip.tap { background: #cbc3b3; color: #1a1408; }
  .oracle-text .pip.tap, .detail-mana-row .pip.tap { font-size: 11px; font-weight: 700; }

  /* ============ v4.18: What's New changelog ============ */
  .topbar { position: relative; }
  .build-badge { position: absolute; top: calc(var(--sat) + 13px); right: 12px; z-index: 2; display: inline-flex; align-items: center; gap: 5px; padding: 4px 9px; min-height: 0; border: 1px solid rgba(224,196,106,.24); border-radius: 999px; background: rgba(201,168,76,.09); color: rgba(240,222,168,.72); font-family: var(--ios-font); font-size: 10px; font-weight: 750; letter-spacing: .06em; cursor: pointer; transition: background .18s ease, color .18s ease, border-color .18s ease; -webkit-tap-highlight-color: transparent; }
  .build-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--gold-bright, #e0c46a); box-shadow: 0 0 6px rgba(224,196,106,.7); }
  .build-badge:hover { background: rgba(201,168,76,.18); border-color: rgba(224,196,106,.45); color: #ffedaf; }
  @media (min-width: 900px) {
    .build-badge { position: static; margin-top: auto; align-self: center; padding: 6px 13px; font-size: 10.5px; }
  }
  .wn-modal { max-width: 460px; padding: 0; display: flex; flex-direction: column; }
  .wn-head { flex-shrink: 0; padding: 20px 22px 14px; border-bottom: 1px solid var(--hair); display: flex; align-items: center; justify-content: space-between; }
  .wn-head .modal-title { margin-bottom: 0; text-align: left; }
  .wn-close { min-height: 0; padding: 7px 13px; border: 1px solid var(--hair); border-radius: 999px; background: rgba(255,255,255,.06); color: rgba(245,235,216,.75); font-family: var(--ios-font); font-size: 12px; font-weight: 700; cursor: pointer; }
  .wn-scroll { overflow-y: auto; overscroll-behavior: contain; padding: 6px 22px 20px; }
  .wn-entry { padding: 15px 0 16px; border-bottom: 1px solid var(--hair); }
  .wn-entry:last-child { border-bottom: none; padding-bottom: 4px; }
  .wn-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .wn-build { font-family: var(--display); font-size: 13px; font-weight: 700; letter-spacing: .08em; color: var(--gold-bright, #e0c46a); }
  .wn-chip { padding: 2px 8px; border-radius: 999px; font-family: var(--ios-font); font-size: 9px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; border: 1px solid rgba(224,196,106,.32); background: rgba(201,168,76,.13); color: rgba(240,222,168,.85); }
  .wn-chip.ui { border-color: rgba(96,150,214,.38); background: rgba(75,143,214,.14); color: rgba(168,204,246,.9); }
  .wn-date { margin-left: auto; font-family: var(--ios-font); font-size: 10.5px; color: rgba(233,226,207,.4); }
  .wn-cmdr { font-family: var(--serif); font-style: italic; font-size: 13px; color: rgba(236,208,140,.8); margin-bottom: 5px; }
  .wn-sum { font-family: var(--ios-font); font-size: 13px; line-height: 1.5; color: rgba(238,229,211,.74); }


  /* ============ v4.20 SKELETON LOADING ============ */
  /* Placeholder cards shown while Scryfall responds. They live inside the real
     grid/rail containers, so columns, gaps, and breakpoints match the content
     that replaces them — no layout jump. Shimmer sweeps as a staggered wave
     (negative delay = every card is mid-sweep immediately), with a faint gold
     glint to keep the arcana identity. */
  .sk-wrap { pointer-events: none; }
  .sk-card { border: 1px solid rgba(255,255,255,.07); border-radius: var(--card-radius); overflow: hidden; background: linear-gradient(155deg, rgba(43,45,59,.5), rgba(22,23,32,.65)); animation: skIn .4s var(--fluid) both; animation-delay: calc(var(--i, 0) * 45ms); }
  .synergy-rail .sk-card { border-radius: 14px; scroll-snap-align: start; }
  .sim-grid .sk-card { border-radius: 15px; }
  .sk-img { width: 100%; aspect-ratio: 488/680; background: linear-gradient(100deg, #14151f 32%, #1e1f2e 45%, rgba(224,196,106,.09) 50%, #1e1f2e 55%, #14151f 68%); background-size: 200% 100%; animation: shimmer 1.6s linear infinite; animation-delay: calc(var(--i, 0) * -130ms); }
  .sk-foot { padding: 8px 8px 9px; border-top: 1px solid rgba(255,255,255,.05); display: flex; flex-direction: column; gap: 6px; }
  .sk-line { height: 9px; width: 72%; border-radius: 5px; background: linear-gradient(100deg, #191a26 32%, #242536 50%, #191a26 68%); background-size: 200% 100%; animation: shimmer 1.6s linear infinite; animation-delay: calc(var(--i, 0) * -130ms); }
  .sk-line.short { width: 44%; }
  @keyframes skIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ============ v4.22 HOVER CARD PEEK (desktop pointers) ============ */
  /* Moxfield-style: hovering a text-only card row floats the full card image
     beside the cursor. One singleton element, pointer-events:none, shown only
     on hover-capable devices (CardPeek.show gates on matchMedia). Fades in
     once the image has actually loaded — never a gray placeholder flash. */
  .card-peek { position: fixed; left: 0; top: 0; width: 264px; z-index: 400; pointer-events: none; opacity: 0; transition: opacity .16s ease; will-change: transform; filter: drop-shadow(0 18px 42px rgba(0,0,0,.62)); }
  .card-peek.on.ready { opacity: 1; }
  .card-peek img { display: block; width: 100%; aspect-ratio: 488/680; border-radius: 12px; background: linear-gradient(160deg, #1a1c26, #0d0e14); border: 1px solid rgba(224,196,106,.28); }
  @media (hover: hover) and (pointer: fine) {
    .dl-name:hover { color: var(--gold-bright); }
    .shop-name { cursor: pointer; }
    .shop-name:hover { color: var(--gold-bright); }
  }
  @media (prefers-reduced-motion: reduce) { .card-peek { transition: none; } }

  /* ============ v4.26 DESKTOP TWO-COLUMN CARD DETAIL ============ */
  /* Scryfall/Moxfield-style: on desktop the card image + actions sit in a
     sticky left column while type/text/prices read in a right column, instead
     of a phone layout stretched across a 1300px panel. The wrappers are
     display:contents by default so mobile layout is bit-for-bit unchanged. */
  .dcol-left, .dcol-right { display: contents; }
  @media (min-width: 900px) {
    .detail-overlay.card-detail { width: min(1060px, calc(100% - 96px)); }
    .card-detail .detail-scroll { display: flex; align-items: flex-start; justify-content: center; gap: 42px; padding: 30px 42px calc(48px + var(--sab-live)); }
    .card-detail .dcol-left { display: block; flex: 0 0 320px; min-width: 0; position: sticky; top: 0; max-height: calc(100dvh - 176px); overflow-y: auto; scrollbar-width: none; overscroll-behavior: contain; padding: 0 14px 14px; margin: 0 -14px -14px; }
    .card-detail .dcol-left::-webkit-scrollbar { display: none; }
    .card-detail .dcol-right { display: block; flex: 1 1 auto; min-width: 0; max-width: 640px; }
    .card-detail .detail-card-img { width: 100%; max-width: 300px; }
  }

  /* ============ v4.28 SEARCH LANDING ============ */
  /* The empty Search screen is the app's front door: instead of one italic
     sentence, show curated one-tap searches (VS Code welcome / Steam browse
     energy). Tiles reuse the skIn keyframe for a staggered entrance. */
  .search-landing { max-width: 1040px; margin: 0 auto; padding: 30px 4px 44px; }
  .sl-head { text-align: center; margin-bottom: 20px; }
  .sl-glyph { font-size: 30px; color: var(--gold-dim); opacity: .55; margin-bottom: 6px; }
  .sl-title { font-family: var(--display); font-size: 19px; font-weight: 700; letter-spacing: .18em; color: var(--gold-bright); text-transform: uppercase; }
  .sl-sub { margin-top: 7px; font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--muted); line-height: 1.4; }
  .sl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(158px, 1fr)); gap: 10px; }
  .sl-tile { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; text-align: left; min-height: 64px; padding: 12px 14px 11px; border: 1px solid var(--hair); border-radius: 15px; background: var(--glass); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: border-color .2s ease, background .2s ease, transform .25s var(--spring); animation: skIn .4s var(--fluid) both; animation-delay: calc(var(--i, 0) * 40ms); }
  .sl-tile:active { transform: scale(.96); }
  .sl-tile-name { font-family: var(--ios-font); font-size: 13.5px; font-weight: 750; color: var(--text); transition: color .18s ease; }
  .sl-tile-sub { font-family: var(--serif); font-style: italic; font-size: 12px; color: var(--muted); line-height: 1.3; }
  .sl-foot { margin-top: 20px; text-align: center; font-family: var(--serif); font-style: italic; font-size: 12.5px; color: var(--muted); line-height: 1.5; }
  .sl-foot em { color: var(--gold-dim); font-style: italic; }
  @media (hover: hover) and (pointer: fine) {
    .sl-tile:hover { border-color: rgba(224,196,106,.45); background: rgba(224,196,106,.07); }
    .sl-tile:hover .sl-tile-name { color: var(--gold-bright); }
  }
  @media (min-width: 900px) {
    .search-landing { padding-top: 44px; }
    .sl-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .sl-tile { padding: 14px 16px 13px; }
  }
</style>

ip (CR 800.4a) \u2014 donated permanents return to you / leave with you."],"insight":"Zedruu is the repo's first DONATE / give-to-opponent commander and the first to exploit ownership\u2260control as a resource."},"1816eede-c5bd-49df-958f-a3af64cb2932":{"traps":["Land destruction / Armageddon symmetrically starves the token half (you depend on YOUR lands entering).","Sacrificing NON-Elemental creatures yields no death burn \u2014 the death trigger is subtype-scoped.","Omnath is slow (MV 7) and does nothing the turn it lands unless a land follows; removal-before-value is a tempo risk."],"insight":"Omnath, Locus of Rage is the repo's first LANDFALL commander and first SUBTYPE-SCOPED aristocrats death-payoff commander."},"d0ade00d-a496-441d-9b7e-7dc033d3292c":{"traps":["A land MILLED from the library or DISCARDED from hand does NOT trigger ability 2 \u2014 the source zone must be the BATTLEFIELD ('put into a graveyard FRO\u2026","Landfall payoffs are a TRAP as a mental model here: Titania rewards lands DYING, not lands ENTERING (opposite of Omnath CS-0050).","Opponents' land destruction aimed at YOUR lands DOES trigger ability 2 (a land you control is put into a graveyard) \u2014 a land-destruction meta is part\u2026"],"insight":"Titania, Protector of Argoth is a mono-green LANDS-DYING engine \u2014 the exact LEAVE-to-graveyard MIRROR of Omnath's landfall (CS-0050)."},"8a5e3c8e-8e22-49b9-8ee5-4a36361f0da6":{"traps":["GROUP-HUG LIABILITY: ability 1 + your symmetric enablers also FILL OPPONENTS' hands (gas).","SELF-DAMAGE: SYMMETRIC punishers you add (Spiteful Visions, Phyrexian Tyranny) + your own wheels damage YOU \u2014 require lifegain support (contrast Unde\u2026","Notion Thief / Alms Collector (yours) turns the burn OFF by stealing opponents' extra draws (you draw them instead \u2192 no opponent draw \u2192 no ability-2 \u2026"],"insight":"Nekusar is the archetypal ENABLER+PAYOFF single card: a symmetric forced-draw engine (ability 1, PA-0041) welded to an opponent-only per-draw damage punisher (ability 2, PA-0042)."},"33666a98-812f-4892-9f8d-33e0cbecc340":{"traps":["SYMMETRY of ability 4 (casterScope=any_player) is pure UPSIDE here (you draw off opponents' spells) \u2014 but it makes Niv a MAGNET: opponents' removal-h\u2026","TARGETED ability 3 needs a legal target: under a board of hexproof creatures + hexproof/'can't be targeted' opponents (rare), pings can be blanked; n\u2026","Ability 3 fires on YOUR draws too (drawerScope=you) \u2014 with a symmetric wheel it does NOT hurt you (you choose targets), but it can force you to deal \u2026"],"insight":"Niv-Mizzet, Parun is a two-family Izzet engine: ability 4 is a spellcast_payoff (NEW PA-0043 \u2014 cast an instant/sorcery -> you draw) that FEEDS ability 3, a player_draw_payoff (PA-0042, EXTE\u2026"},"0a69c3dd-52a3-4ef6-b53f-b0780e0dc5f8":{"traps":["Discard / symmetric wheels SHRINK Alrund (empties your hand) \u2014 the OPPOSITE of Nekusar, where wheels are upside.","Empty-hand combat: Alrund can be a 1/1 if you dump your hand; time attacks to a full hand + foretell pile.","Base 1/1 is fragile; the +1/+1s vanish off the battlefield (rule) \u2014 any wipe/removal with no banked cards kills it."],"insight":"Alrund is a mono-U hand-size / foretell payoff: ability 2 (a NEW reveal_filter_advantage engine) fills your hand each end step, and ability 1 (count_scaled_value) converts hand + foretold-e\u2026"},"e4625704-1d52-44e4-804f-2f45644d76ac":{"traps":["Graveyard exile (opponents' hate OR your own accidental self-exile) strips the resource \u2014 the engine's hard off-switch.","Instants/sorceries CANNOT be recast (not permanents) \u2014 a deckbuilding suppression (bias toward permanent-based interaction: Beast Within, permanent r\u2026","Expensive fatties are better REANIMATED free (PA-0033) than hard-cast at full cost via Muldrotha \u2014 reanimate-others is a suppression signal for Muldr\u2026"],"insight":"Muldrotha opens a NEW reusable family \u2014 a standing permission to CAST/PLAY cards from a zone where they already reside (the graveyard), quota-gated by permanent type, at full/alternative co\u2026"},"name:isshin, two heavens as one":{"traps":["combat-damage payoffs as the doubled pool — Isshin doubles abilities whose trigger condition is ATTACKING (declaration); 'deals combat damage to a player' triggers on damage and is NOT doubled (official ruling: only conditions directly related to attacking — 'becomes tapped' isn't doubled either).","creatures put onto the battlefield attacking (myriad tokens, enters-tapped-and-attacking) were never DECLARED as attackers — their own attack triggers stay silent (same ruling family as Kaalia/Yuriko); the doubled value is the CREATING trigger on the real attacker.","reading him as a Panharmonicon — ETB, death, and cast triggers are untouched; only attack-caused triggers double, so ETB-value creatures without attack triggers add nothing to the engine.","only counting YOUR attackers — ANY creature attacking can cause your permanents' abilities to trigger (you need only control the permanent with the ability); goad and 'attacks one of your opponents' payoffs turn the whole table's combats into doubled value."],"insight":"Isshin opens the trigger_amplifier family (P.trigAmpScope): 'that ability triggers an additional time' is a payoff MULTIPLIER whose scope clause picks the entire deck — attacking (Isshin), a permanent entering (Yarok/Panharmonicon), a creature dying (Teysa Karlov), casting/copying (Veyran). The engine now reads the template and swaps in scope-matched rails; for Isshin: declaration-trigger density, enters-attacking token makers, extra combats. (Name-keyed: swap to his oracle_id when Scryfall access returns.)"},"name:feather, the redeemed":{"traps":["generic spellslinger fuel — counterspells, face burn, and look-at-the-top cantrips (Opt-class) never target your creatures, so they cast once and are gone like in any other deck; the engine only pays on spells aimed at your own team.","countered or fizzled spells are NOT returned — the exile is a replacement that applies 'as it resolves' (official ruling): a spell that's countered, or whose every target is illegal, goes to the graveyard as normal.","removal that targets only THEIR permanents never comes back — prize double-target interaction (Reckless Rage-class) and own-team spells with splash damage (Chandra's Ignition) so removal rides the engine too.","copies are not casts and are not cards — Zada/Mirrorwing/storm copies don't re-trigger Feather; and every recast still costs full mana, so the engine is repeatable, not free — the reason mv 1–2 fuel is the build rule."],"insight":"Feather opens the cast_target_scope family (P.castTargetsOwn): a cast trigger gated on targeting your OWN creatures turns one-shot cantrips into a standing engine — fuel is cheap own-targeting tricks (Defiant Strike/Gods Willing class), payoffs are target-multipliers (heroic, Zada, Mirrorwing, Leyline of Resonance) plus ordinary cast-trigger engines that see the same casts. Her 'instead of putting it into your graveyard' clause is a BYPASS, not a graveyard theme — the graveyard atom now strips that template before matching. (Name-keyed: swap to her oracle_id when Scryfall access returns.)"},"name:krenko, mob boss":{"traps":["reading him as attack/combat typal — Krenko's engine is an activated {T} ability: no attack, no combat, no trigger needed; the deck maximizes ACTIVATIONS (untappers, haste), not attack triggers or combat payoffs.","untappers as pseudo-haste — an untapped but summoning-sick Krenko still can't pay {T} (you must have controlled him since your turn began); haste enablers (Goblin Chieftain, Goblin Warchief, Thousand-Year Elixir's as-though-haste) start the engine the turn he lands — the removal-magnet turn — while untappers only multiply activations AFTER that.","anthems before bodies — X counts the NUMBER of Goblins at resolution, not their stats, and tokens count themselves next activation (each tap roughly doubles the board); token count compounds, pump does not — anthems are the finisher, not the engine.","treating his ability like a mana ability — it isn't one, which is exactly why Rings of Brighthearth and Illusionist's Bracers CAN copy it (both exclude mana abilities); the same copy rail on a Selvala-class mana-tap commander would be dead cardboard."],"insight":"Krenko opens the tap_activated_engine family (P.tapActivated): every atom in the engine reads TRIGGERED wording, so the #5 commander on EDHREC — whose entire deck hangs off '{T}: Create X 1/1 Goblins' — was invisible beyond generic typal/token rails. The parameter reads the commander's own un-quoted '{T} … :' costs (granted-ability quotes and reminder text stripped) and injects Untappers (more activations per turn), Haste Enablers (summoning sickness gates {T} — the real reason Chieftain/Warchief/Elixir headline his EDHREC page), and, only when an effect isn't a mana ability, Ability Copiers (Rings/Bracers class). Mana-tap commanders like Selvala get untap + haste but no copy rail. (Name-keyed: swap to his oracle_id when Scryfall access returns.)"},"name:prosper, tome-bound":{"traps":["go-wide token payoffs — the tokens Prosper makes are TREASURES: artifacts, not creatures, so anthems and 'for each creature you control' payoffs whiff entirely; the real pool is Treasure counts, artifact synergies, and sacrifice value (the reason the tokens atom now ignores artifact-token creation).","deathtouch-matters packages — his deathtouch is incidental deterrence on a 1/4 body, not a theme; granters and ping-payoffs add nothing to the exile engine (the reason the deathtouch atom now requires matters-wording, not a bare keyword).","counting only his own end-step exile — the Treasure trigger fires on EVERY play from exile: foretell, suspend, plot, madness, adventures, cascade (rulings-verified — cascade casts from exile), and even opponents' cards played from theft-exile; one Treasure per CARD played, and lands played from exile count too.","treating the impulse as draw-now — the Mystic Arcanum card is playable until the end of your NEXT turn, spanning a whole table cycle, so instants and flash are worth extra; but a LAND exiled this way needs your own turn and an unused land drop, and a card left unplayed is simply lost."],"insight":"Prosper forced the exileplay atom into full RAILS membership: it was the only major atom still emitting a generic one-query synergy rail, with no enabler/payoff split — so the #1 impulse commander got neither impulse-draw density (Light Up the Stage/Reckless Impulse class, 68% inclusion, plus foretell/plot) nor cast-from-exile rewards (Wild-Magic Sorcerer's cascade grant, Passionate Archaeologist) as distinct rails. Payoff queries use exact templates ('spell from exile', 'card from exile') so adventure/foretell reminder text can't flood the rail. He also exposed two matcher traps fixed this run: 'create a Treasure token' false-firing the go-wide tokens atom, and bare-keyword deathtouch firing Deathtouch Matters. (Name-keyed: swap to his oracle_id when Scryfall access returns.)"},"name:animar, soul of elements":{"traps": ["a +1/+1 counters shell — counter supply and 'remove a counter' payoffs whiff: the counters land only on ANIMAR HIMSELF as a cost dial, so board-wide counter payoffs see nothing and removal payoffs literally raise your curve; the exception is doublers (Branching Evolution-class, 26% of EDHREC lists) — a doubled counter is a deeper discount.", "pip-heavy fatties as the top end — the discount is generic-only: {1} less per counter can never shrink colored pips (cost rules: reductions eat the generic component), so colorless Eldrazi-class haymakers with all-generic costs are the ones that end up free; and morph is a colorless {3} creature spell — free at three counters, castable face-down from any hand.", "instant/sorcery slots — noncreature spells are neither discounted nor grow him, so every one is off-engine; run the creature-shaped versions of the same jobs (Man-o'-War bounce, Reclamation Sage removal, Beast Whisperer draw) so even interaction feeds the counter engine.", "reading protection from white and black as unkillable — wraths, edicts, and -X/-X don't target and kill him fine; the counters vanish when he leaves and he re-enters at zero, and (official ruling) the counter from a cast never discounts the spell that banked it — the engine is always one cast behind, so rebuild via cheap-creature density, not pump."], "insight": "Animar opens the self_counter_discount family (P.counterFuel + P.costDownType): a cast trigger banks +1/+1 counters on the commander itself while a static converts each one into a type-scoped cost reduction — a shape the engine was structurally blind to, because the costdown atom read only instant/sorcery wording. The real deck is recast DENSITY: self-bounce loops (Shrieking Drake, Ancestral Statue, Cloudstone Curio — the headline EDHREC synergies, and the classic infinite once casts are free) ratchet the discount, creature-cast payoffs (Guardian Project class) pay per loop, and the discounted top end is generic-heavy colorless. He also exposed the dead FAM.cast key that had been silently denying every spellslinger commander its Synergy Ramp rail. (Name-keyed: swap to his oracle_id when Scryfall access returns.)"},"name:the ur-dragon":{"traps":["reading the put as Kaalia — the permanent enters AFTER attackers are declared: it is not attacking, it can't be moved into the attack even with haste (official ruling), and its own attack triggers stay silent this combat; ETB-value payoffs already on board (Terror of the Peaks, Scourge of Valkas class) are what convert the free drop into damage.","one put per combat, not per Dragon — the trigger is a single batch: the draw scales with how many Dragons attacked, but you put exactly ONE permanent no matter how wide the swing or how many players were attacked (official ruling); extra combats multiply the put, extra bodies only multiply the draw.","enters-attacking Dragons don't count — a Dragon put onto the battlefield attacking was never DECLARED an attacker, so it neither triggers the eminence draw nor its own attack abilities (official ruling — the Kaalia/Yuriko/Isshin family again, from the other side).","building as if he must resolve — eminence runs from the command zone: every OTHER Dragon spell costs {1} less all game, so the deck functions before the 9-drop ever lands; but the discount never touches his own cost or colored pips, so ramp and redundant reducers (Urza's Incubator 46% inclusion, Herald's Horn 43%) still carry the five-color curve."],"insight":"The Ur-Dragon opens the typal_cost_discount family (P.tribeCostDown) and exposed a wording blind spot: batch attack triggers ('whenever one or more … attack') dodge every singular 'attacks' regex, and his 'permanent card' put dodged the creature-only massdeploy test — so the #1 commander on EDHREC read as bare Dragon typal. The engine now parses plural batch attacks (attack atom + deployOnAttack — haste, attack safety, extra combats), 'permanent card' mass-deploys, and stacks redundant typal reducers: an eminence discount is an engine half the command zone provides for free. (Name-keyed: swap to his oracle_id when Scryfall access returns.)"},"name:sisay, weatherlight captain":{"traps":["a +1/+1 counters or pump-matters shell — she grows by COLOR COUNT among your OTHER legendary permanents (no counters involved, ceiling +5/+5): five mono-white legends add exactly one color, while a single five-color legend (Jegantha) maxes her alone — color diversity, not legend count, sets her power.","misreading the fetch ceiling — 'mana value LESS THAN Sisay's power' is strict: at 7 power she finds MV 6 and below; an {X} cost counts X as 0 in the library, and legendary lands are MV 0 so they're always legal finds (official rulings) — though a fetched land adds no colors to her count and doesn't use your land drop.","treating the activation as once-a-turn — it is NOT a {T} ability: with WUBRG available again you can chain fetches in one turn, and because her power updates continuously, finding a color-heavy legend (Jegantha, Faeburrow Elder) mid-chain unlocks a bigger next fetch — the reason rainbow mana, not untappers, is the enabler suite.","generic five-color goodstuff — nonlegendary cards are invisible to both halves of her engine: they add no power and can't be fetched, so every slot wants to be a legend or find/protect one — even the rocks (Mox Amber is legendary and feeds the count) and lands (legendary lands are fetchable) can stay on-engine."],"insight":"Sisay opens the legendary_matters family: 'legendary' is a SUPERTYPE, so the tribe detector rightly ignores it and no triggered-wording atom could see her — an 18,000-deck toolbox commander read as a blank. The new legendary atom (density enabler + Mox Amber/Heroes' Podium-class payoff rails) also wakes Kethis, Reki, Captain Sisay, and Yoshimaru, and she contributes P.wubrgCost: an ability priced {W}{U}{B}{R}{G} (Sisay, Najeela, Golos, Jodah's alternative cost) demands one pip of EACH color on demand, so Chromatic Lantern / Faeburrow Elder / Bloom Tender / Jegantha-class rainbow producers are the ramp suite — while Ramos-style 'Add {W}{U}{B}{R}{G}' PRODUCERS correctly don't fire it. (Name-keyed: swap to her oracle_id when Scryfall access returns.)"},"02598a35-1b11-4abe-89cd-fc44c8c36c15":{"traps":["Human typal go-wide — the attackers that FIRE her must be NON-Human; Humans already in play trigger nothing. Humans are the PAYOFF the deploy pulls from your library, not the bodies that swing to trigger it, so a Human-heavy attack is a dead swing while anthems only help the deployed board. Go wide with cheap non-Human tokens and creatures — each one that attacks is a separate look at your top six for a free Human.","the deploy is from the LIBRARY, not the hand — 'keep the hand full' and hand-size payoffs whiff (that is massdeploy's enabler, and massdeploy never even fires on her). The fuel is Human DENSITY in the deck (so the top six connects) plus card selection. A body put tapped and attacking was never DECLARED an attacker (official ruling — the Kaalia/Yuriko/Isshin family), so its own 'whenever this attacks' triggers stay silent; prize ETB value, combat-damage triggers, static anthems, and just-big bodies (the deployed Human also gains indestructible until end of turn, so it survives the swing).","one deploy per attacker, one Human each — she looks at six and puts at most ONE Human per trigger, so a wide board of cheap non-Humans plus extra combats (which re-declare every attacker) multiplies the deploys far better than a single evasive threat; non-Human token makers are the best enablers.","reading 'it gains indestructible' as protecting Winota — that clause shields the Human she cheats in for that combat, not the commander (she has no self-protection, so she still wants haste and a clear turn); and because the trigger is a bare 'attacks', swinging a non-Human at a planeswalker or battle triggers her all the same."],"insight":"Winota opens the library_deploy_gowide family (P.libDeploy): a type-locked deploy sourced from the LIBRARY (not the hand — so the massdeploy / deployTypes / deployOnAttack path, all gated on 'from your hand', was blind) and fired by OTHER creatures attacking, making it a GO-WIDE engine rather than a single-fatty cheat. The engine now reads 'onto the battlefield tapped and attacking' without 'from your hand', parses the deployed type (Human — re-scoped from the mistaken 'More Humans' typal rail into a high-impact deploy-pool payoff) and the fueling attacker type (non-Human — a cheap go-wide enabler rail), adds extra combats as the multiplier, and strips the false Voltron rail that fired on the deployed body's 'it gains indestructible'. The put body was never declared an attacker (Kaalia/Yuriko/Isshin ruling family), so ETB / combat-damage / static Humans beat 'whenever it attacks' ones. (Keyed by oracle_id 02598a35-1b11-4abe-89cd-fc44c8c36c15. Card text verified via web search — the Scryfall API is blocked from the sandbox — and both new rail queries were QA'd live on Scryfall through the Chrome extension, EDHREC-sorted: Human Haymakers surfaces Combat Celebrant, Blade Historian, Angrath's Marauders, and Odric; Non-Human Attackers surfaces Ragavan and the cheap Boros bodies.)"}};
const ROLE_LABEL = { enabler: 'Enabler', payoff: 'Payoff', amplifier: 'Amplifier', gate: 'Gate', staple: 'Staple', synergy: 'Synergy' };
// ============================================================
// ENGINE v3 — role-based rails (from the commander study ledger).
// A commander is an ENGINE: it provides some halves and needs the
// others. Detection decides which side the commander sits on
// (eTest = it enables, pTest = it pays off), then rails are
// emitted with roles, needed-half first. Suppressions become
// user-facing "traps"; gates (like Kalamax's tapped check)
// generate their own enabler rails.
// ============================================================
const RAILS = {
    legendary: {
        // eTest: the commander SUPPLIES legends (tutors them out / recurs them);
        // pTest: it COUNTS or rewards them (needs density). Sisay and Kethis fire
        // both → default order keeps the density (enabler) rail first.
        eTest: /search your library for a legendary|put[^.]{0,40}legendary [^.]{0,30}onto the battlefield|legendary cards? (in|from) your graveyard/,
        pTest: /legendary spells you cast cost|whenever you cast a legendary|for each [^.]{0,24}legendary|legendary (creatures?|permanents?) you control/,
        rails: [
            { role: 'enabler', title: 'Legendary Density', sub: 'A hall of heroes', q: '(t:legendary -t:land)', why: 'the engine only sees legends — every slot that can be a legendary permanent should be one, and EDHREC ranking surfaces the best in these colors' },
            { role: 'payoff', title: 'Legends Matter', sub: 'Support for the hall', q: '(o:"legendary creature" OR o:"legendary permanent" OR o:"legendary spell" OR o:"legendary card")', why: 'Mox Amber, Heroes’ Podium, and Time of Need-class support pays off the density the deck already runs' }
        ]
    },
    wheels: {
        eTest: /each player draws|draws an additional card|discards? (their|his or her) hand/,
        pTest: /whenever an opponent draws|whenever a player draws/,
        rails: [
            { role: 'enabler', title: 'Wheel Enablers', sub: 'Force the draws', q: '(o:"each player draws" OR o:"draws an additional card" OR (o:"discards" o:"hand" o:"draws"))', why: 'cards that force everyone to draw \u2014 the fuel' },
            { role: 'payoff', title: 'Draw Punishers', sub: 'Make it hurt', q: '(o:"whenever an opponent draws" OR o:"whenever a player draws a card")', why: 'redundant payoffs for all that forced drawing' }
        ]
    },
    treasure: {
        eTest: /creates? .{0,30}treasure/,
        pTest: /sacrifice a treasure|treasures? you control|for each treasure/,
        rails: [
            { role: 'enabler', title: 'Treasure Producers', sub: 'Mint the gold', q: '(o:create o:treasure)', why: 'sources that mint Treasure' },
            { role: 'payoff', title: 'Treasure Payoffs', sub: 'Spend it well', q: '(o:"treasures you control" OR (o:sacrifice o:treasure) OR o:"for each treasure")', why: 'ways to convert Treasure into wins' }
        ]
    },
    food: {
        eTest: /creates? .{0,30}food/,
        pTest: /sacrifice a food|foods? you control|whenever a food|for each food/,
        rails: [
            { role: 'enabler', title: 'Food Producers', sub: 'Stock the pantry', q: '(o:create o:food)', why: 'sources that bake Food tokens' },
            { role: 'payoff', title: 'Food Payoffs', sub: 'Eat well', q: '(o:"sacrifice a food" OR o:"foods you control" OR o:"whenever a food" OR (o:food o:sacrifice))', why: 'cards that reward holding or eating Food' }
        ]
    },
    tokens: {
        eTest: /creates? .{0,40}token/,
        pTest: /for each creature you control|creatures you control get/,
        rails: [
            { role: 'enabler', title: 'Token Producers', sub: 'Raise the army', q: '(o:create o:token -o:"controller creates" -o:"opponent creates" -o:"opponents create" -o:"that player creates")', why: 'ways to flood the board \u2014 yours, not theirs' },
            { role: 'payoff', title: 'Go-Wide Payoffs', sub: 'Cash in the crowd', q: '(o:"creatures you control get" OR o:"for each creature you control" OR o:"twice that many")', why: 'anthems, doublers, and per-creature rewards' }
        ]
    },
    counters: {
        rails: [
            { role: 'enabler', title: 'Counter Supply', sub: 'Put them on', q: '(o:"put a +1/+1 counter" OR o:"put x +1/+1 counters" OR o:"enters with a +1/+1")', why: 'supply \u2014 gets counters onto the board' },
            { role: 'amplifier', title: 'Counter Amplifiers', sub: 'Double the dose', q: '(o:proliferate OR o:"one more counter" OR o:"twice that many counters" OR o:"additional +1/+1 counter")', why: 'proliferate and doublers multiply every source' },
            { role: 'payoff', title: 'Counter Payoffs', sub: 'Cash them in', q: '(o:"remove a +1/+1 counter" OR o:"creatures you control with counters" OR o:"each creature you control with a +1/+1 counter")', why: 'demand \u2014 reads or spends the counters' }
        ]
    },
    sac: {
        rails: [
            { role: 'enabler', title: 'Fodder', sub: 'Bodies to burn', q: '((o:create o:token t:instant) OR (o:create o:token o:creature) OR o:"create two")', why: 'cheap recurring bodies to feed the outlets' },
            { role: 'payoff', title: 'Death Payoffs', sub: 'Profit per corpse', q: '(o:"you control dies" OR o:"another creature dies" OR o:"whenever a creature dies")', why: 'rewards for every sacrifice' }
        ]
    },
    death: {
        rails: [
            { role: 'enabler', title: 'Sac Outlets & Fodder', sub: 'Keep the deaths coming', q: '(o:"sacrifice a creature:" OR o:"sacrifice another creature" OR (o:create o:token o:creature))', why: 'free outlets plus token fodder keep the trigger flowing' },
            { role: 'payoff', title: 'Aristocrat Drains', sub: 'Finish the table', q: '(o:"each opponent loses" OR (o:dies o:"loses 1 life"))', why: 'turns each death into reach' }
        ]
    },
    leavesbf: {
        pTest: /leaves the battlefield/,
        rails: [
            { role: 'enabler', title: 'Blink & Flicker', sub: 'Exit, stage left', q: '(o:exile o:return o:battlefield)', why: 'every flicker is a departure and a return' },
            { role: 'enabler', title: 'Free Sac Outlets', sub: 'Leave on your terms', q: '(o:"sacrifice a creature:" OR o:"sacrifice another creature:")', why: 'sacrifice makes things leave whenever you want' }
        ]
    },
    poison: {
        pTest: /poison counters?/,
